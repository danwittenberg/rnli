<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifeboat Station Training Matrix</title>
    <style>
        :root { --primary: #002366; --secondary: #f05a28; --bg: #f4f7f6; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .hidden { display: none !important; }
        
        #login-screen { max-width: 400px; margin: 100px auto; text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { padding: 12px; width: 80%; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        button.login-btn { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .controls { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .tab { padding: 10px 20px; background: #fff; border: 1px solid #ddd; border-radius: 25px; cursor: pointer; white-space: nowrap; font-weight: 500; transition: 0.2s; }
        .tab.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        
        .matrix-container { overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { border-collapse: collapse; width: 100%; font-size: 0.9rem; }
        th, td { border: 1px solid #edf2f7; padding: 10px; text-align: center; min-width: 140px; }
        
        th:first-child, td:first-child { 
            position: sticky; left: 0; background: #fff; z-index: 10; 
            font-weight: bold; border-right: 2px solid #cbd5e0; text-align: left; min-width: 160px;
        }
        tr:nth-child(even) td:first-child { background: #f9fafb; }

        .cell-btn { width: 100%; min-height: 50px; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px; }
        .status-empty { background: #f8fafc; color: #94a3b8; border: 1px dashed #cbd5e0; }
        .status-empty:hover { background: #e2e8f0; color: var(--primary); }
        
        .status-pending { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; cursor: default; }
        
        .status-allocated { background: #dcfce7; color: #166534; border: 1px solid #86efac; cursor: default; }
        .alloc-cat { font-weight: 800; font-size: 0.7rem; text-transform: uppercase; border-bottom: 1px solid #86efac; margin-bottom: 3px; width: 100%; }
        .alloc-role { font-size: 0.85rem; font-weight: 600; }

        .session-header { font-size: 0.85rem; color: var(--primary); font-weight: bold; }
        .session-label { display: block; font-weight: normal; font-style: italic; color: #718096; font-size: 0.75rem; margin-top: 4px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: var(--primary)">Lifeboat Station Login</h2>
        <input type="password" id="station-pass" placeholder="Password">
        <br>
        <button class="login-btn" onclick="checkLogin()">Access Matrix</button>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <h2 style="margin:0">Training Matrix</h2>
        </header>
        <div class="controls" id="month-tabs"></div>
        <div class="matrix-container">
            <table id="matrix">
                <thead><tr id="matrix-head"></tr></thead>
                <tbody id="matrix-body"></tbody>
            </table>
        </div>
    </div>

    <div id="admin-panel" class="hidden" style="background: #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
    <h3 style="margin-top:0">Admin: Add New Session</h3>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <input type="text" id="new-id" placeholder="ID (e.g. S10)" style="width:80px">
        <input type="date" id="new-date">
        <input type="time" id="new-time">
        <input type="text" id="new-topic" placeholder="Topic">
        <input type="text" id="new-month" placeholder="Month (e.g. June)">
        <button onclick="submitNewSession()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer">Add Session</button>
    </div>
</div>

<div id="alloc-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: flex; align-items: center; justify-content: center;">
    <div style="background: white; padding: 25px; border-radius: 12px; width: 300px;">
        <h3>Allocate Crew</h3>
        <p id="alloc-name"></p>
        <label>Role Type:</label>
        <select id="alloc-type" style="width:100%; padding:8px; margin-bottom:10px;"></select>
        <label>Specific Role (e.g. Cox/Helm):</label>
        <select id="alloc-role" style="width:100%; padding:8px; margin-bottom:20px;"></select>
        <button onclick="submitAllocation()" style="width:100%; background:var(--primary); color:white; padding:10px; border:none; border-radius:4px;">Confirm Allocation</button>
        <button onclick="closeAlloc()" style="width:100%; background:none; border:none; color:grey; margin-top:10px;">Cancel</button>
    </div>
</div>
    
    <div id="signup-modal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: center; justify-content: center;">
        <div style="background: white; padding: 25px; border-radius: 12px; max-width: 350px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <h3 id="modal-title" style="margin-top: 0; color: var(--primary);">Sign Up</h3>
            <label style="font-size: 0.8rem; font-weight: bold;">Preferred Choice:</label>
            <select id="select-cat" style="width: 100%; padding: 10px; margin: 8px 0 20px 0; border: 1px solid #ccc; border-radius: 4px;"></select>
            <label style="font-size: 0.8rem; font-weight: bold;">Activity / OCF Level:</label>
            <select id="select-act" style="width: 100%; padding: 10px; margin: 8px 0 20px 0; border: 1px solid #ccc; border-radius: 4px;"></select>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="closeModal()" style="flex: 1; padding: 10px; background: #eee; border: none; border-radius: 4px; cursor: pointer;">Cancel</button>
                <button id="submit-btn" onclick="submitSignup()" style="flex: 2; padding: 10px; background: var(--secondary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzYluQ9ADJKjNu_S8eke9xAG7qWvwDZcV9wllfrjub0KMZAeXLc-Pc0aE1i-7ID9DM7Vw/exec"; 
        const STATION_PASSWORD = "RNLI"; 
        
        let db = { crew: [], sessions: [], signups: [], config: { categories: [], activities: [] } };
        let currentMonth = "";
        let pendingSignup = { name: "", sessionId: "" };

let isAdmin = false;

function checkLogin() {
    const pass = document.getElementById('station-pass').value;
    if(pass === STATION_PASSWORD || pass === "ADMIN123") { // Add an admin password
        if(pass === "ADMIN123") {
            isAdmin = true;
            document.getElementById('admin-panel').classList.remove('hidden');
        }
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
        fetchData();
    } else { alert("Access Denied"); }
}

// Modify renderCell to allow admins to click Green or Yellow boxes
function renderCell(name, sessionId, signup) {
    if (!signup) return `<button class="cell-btn status-empty" onclick="handleSignup('${name}', '${sessionId}')">Sign Up</button>`;
    
    const clickAction = isAdmin ? `onclick="openAlloc('${name}', '${sessionId}')"` : (signup.allocatedCategory ? '' : `onclick="handleSignup('${name}', '${sessionId}')"`);
    const cursor = isAdmin || !signup.allocatedCategory ? 'pointer' : 'default';

    if (signup.allocatedCategory && signup.allocatedRole) {
        return `<div class="cell-btn status-allocated" ${clickAction} style="cursor:${cursor}"><div class="alloc-cat">${signup.allocatedCategory}</div><div class="alloc-role">${signup.allocatedRole}</div></div>`;
    }
    return `<button class="cell-btn status-pending" ${clickAction}>Requested:<br><strong>${signup.preferred}</strong></button>`;
}

// Admin logic for Session adding
function submitNewSession() {
    const data = {
        action: "addSession",
        id: document.getElementById('new-id').value,
        date: document.getElementById('new-date').value,
        time: document.getElementById('new-time').value,
        topic: document.getElementById('new-topic').value,
        month: document.getElementById('new-month').value
    };
    fetch(API_URL, { method: 'POST', body: JSON.stringify(data) }).then(() => { alert("Added!"); fetchData(); });
}

// Admin logic for Allocation
let allocTarget = {};
function openAlloc(name, sessionId) {
    allocTarget = { name, sessionId };
    document.getElementById('alloc-name').innerText = name;
    document.getElementById('alloc-type').innerHTML = db.config.categories.map(c => `<option value="${c}">${c}</option>`).join('');
    document.getElementById('alloc-role').innerHTML = db.config.roles.map(r => `<option value="${r}">${r}</option>`).join('');
    document.getElementById('alloc-modal').classList.remove('hidden');
}

function submitAllocation() {
    const data = {
        action: "allocate",
        crewName: allocTarget.name,
        sessionId: allocTarget.sessionId,
        roleType: document.getElementById('alloc-type').value,
        specificRole: document.getElementById('alloc-role').value
    };
    fetch(API_URL, { method: 'POST', body: JSON.stringify(data) }).then(() => { 
        document.getElementById('alloc-modal').classList.add('hidden');
        fetchData(); 
    });
}
function closeAlloc() { document.getElementById('alloc-modal').classList.add('hidden'); }

        async function fetchData() {
            try {
                const resp = await fetch(API_URL);
                db = await resp.json();
                const months = [...new Set(db.sessions.map(s => s.month))];
                if(!currentMonth) currentMonth = months[0];
                renderTabs(months);
                renderMatrix();
            } catch (e) {
                console.error(e);
                alert("Connection Error: Check Apps Script deployment and URL.");
            }
        }

        function renderTabs(months) {
            const container = document.getElementById('month-tabs');
            container.innerHTML = months.map(m => `
                <div class="tab ${m === currentMonth ? 'active' : ''}" onclick="setMonth('${m}')">${m}</div>
            `).join('');
        }

        function setMonth(m) {
            currentMonth = m;
            renderTabs([...new Set(db.sessions.map(s => s.month))]);
            renderMatrix();
        }

        function renderMatrix() {
            const filteredSessions = db.sessions.filter(s => s.month === currentMonth);
            document.getElementById('matrix-head').innerHTML = `<th>Crew Name</th>` + filteredSessions.map(s => `
                <th>
                    <div class="session-header">${new Date(s.date).toLocaleDateString('en-GB', {day:'numeric', month:'short'})} @ ${s.time}</div>
                    <span class="session-label">${s.topic}</span>
                </th>
            `).join('');

            document.getElementById('matrix-body').innerHTML = db.crew.map(name => `
                <tr>
                    <td>${name}</td>
                    ${filteredSessions.map(s => {
                        const signup = db.signups.find(sig => sig.name === name && sig.sessionId === s.id);
                        return `<td>${renderCell(name, s.id, signup)}</td>`;
                    }).join('')}
                </tr>
            `).join('');
        }

function renderCell(name, sessionId, signup) {
    // 1. Not signed up yet (Grey)
    if (!signup) {
        return `<button class="cell-btn status-empty" onclick="handleSignup('${name}', '${sessionId}')">Sign Up</button>`;
    }
    
    // 2. Already allocated by Admin (Green) - Keep this locked
    if (signup.allocatedCategory && signup.allocatedRole) {
        return `
            <div class="cell-btn status-allocated">
                <div class="alloc-cat">${signup.allocatedCategory}</div>
                <div class="alloc-role">${signup.allocatedRole}</div>
            </div>`;
    }
    
    // 3. Signed up but pending (Yellow) - Make this clickable to change choice
    return `
        <button class="cell-btn status-pending" onclick="handleSignup('${name}', '${sessionId}')">
            <div>Requested:</div>
            <strong>${signup.preferred}</strong>
            <div style="font-size:0.6rem; margin-top:4px; opacity:0.7;">(Tap to change)</div>
        </button>`;
}

        function handleSignup(name, sessionId) {
            pendingSignup = { name, sessionId };
            document.getElementById('select-cat').innerHTML = db.config.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('select-act').innerHTML = db.config.activities.map(a => `<option value="${a}">${a}</option>`).join('');
            document.getElementById('modal-title').innerText = "Sign Up: " + name;
            document.getElementById('signup-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('signup-modal').classList.add('hidden'); }

        function submitSignup() {
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Saving..."; btn.disabled = true;
            
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ 
                    crewName: pendingSignup.name, 
                    sessionId: pendingSignup.sessionId, 
                    preferredRole: document.getElementById('select-cat').value, 
                    activity: document.getElementById('select-act').value 
                })
            }).then(() => {
                alert("Success!");
                closeModal();
                fetchData();
            }).catch(err => alert("Error: " + err))
              .finally(() => { btn.innerText = "Confirm"; btn.disabled = false; });
        }
    </script>
</body>
</html>
