<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifeboat Training Matrix</title>
    <style>
        :root { --primary: #002366; --secondary: #f05a28; --bg: #f4f7f6; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        .hidden { display: none !important; }
        
        /* Login Screen */
        #login-screen { max-width: 400px; margin: 80px auto; text-align: center; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input, select { padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; width: 100%; box-sizing: border-box; }
        .btn { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Tabs and Controls */
        .controls { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab { padding: 8px 16px; background: #fff; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9rem; }
        .tab.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        
        /* Table / Matrix */
        .matrix-container { overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { border-collapse: collapse; width: 100%; font-size: 0.85rem; }
        th, td { border: 1px solid #edf2f7; padding: 10px; text-align: center; min-width: 120px; }
        th:first-child, td:first-child { position: sticky; left: 0; background: #fff; z-index: 10; font-weight: bold; border-right: 2px solid #cbd5e0; text-align: left; min-width: 150px; }

        /* Cell Buttons */
        .cell-btn { width: 100%; min-height: 55px; border: none; border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; padding: 5px; }
        .status-empty { background: #f8fafc; color: #94a3b8; border: 1px dashed #ccc; }
        .status-pending { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
        .status-allocated { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .alloc-cat { font-weight: 800; font-size: 0.65rem; text-transform: uppercase; border-bottom: 1px solid #86efac; margin-bottom: 3px; width: 100%; }

        /* Modals */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 320px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); }

        /* Loading Spinner */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <p style="margin-top:15px; font-weight:bold; color:var(--primary)">Syncing with Station Sheet...</p>
    </div>

    <div id="login-screen">
        <h2 style="color: var(--primary)">RNLI Training Matrix</h2>
        <input type="password" id="pass" placeholder="Enter Password" onkeydown="if(event.key==='Enter')login()">
        <button class="btn" onclick="login()">Login</button>
        <p style="font-size:0.75rem; color:#666; margin-top:10px;">Crew: "RNLI" | Admin: "ADMIN123"</p>
    </div>

    <div id="main-content" class="hidden">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="margin:0; font-size:1.2rem;">Training Matrix</h2>
            <button onclick="location.reload()" style="background:none; border:none; color:grey; cursor:pointer;">Logout</button>
        </header>

        <div id="admin-panel" class="hidden" style="background:#e2e8f0; padding:15px; border-radius:8px; margin-bottom:20px; border: 1px solid #cbd5e0;">
            <h4 style="margin:0 0 10px 0">Admin: Add New Training Date</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="date" id="n-date"> 
                <input type="time" id="n-time">
                <input type="text" id="n-topic" placeholder="Topic (e.g. Nav & Radar)"> 
                <input type="text" id="n-month" placeholder="Month (e.g. June)">
                <button type="button" onclick="addSession(event)" class="btn" style="grid-column: span 2">Add to Matrix</button>
            </div>
        </div>

        <div class="controls" id="tabs"></div>
        
        <div class="matrix-container">
            <table>
                <thead><tr id="h-row"></tr></thead>
                <tbody id="b-rows"></tbody>
            </table>
        </div>
    </div>

    <div id="modal-signup" class="modal hidden">
        <div class="modal-content">
            <h3 id="s-title" style="margin-top:0">Sign Up</h3>
            <label style="font-size:0.8rem; font-weight:bold;">Preferred Choice:</label>
            <select id="s-cat"></select>
            <label style="font-size:0.8rem; font-weight:bold;">Activity:</label>
            <select id="s-act"></select>
            <button onclick="submitSignup()" class="btn" style="background:var(--secondary); margin-top:10px;">Confirm Sign Up</button>
            <button onclick="closeModals()" style="width:100%; background:none; border:none; margin-top:10px; color:grey; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div id="modal-alloc" class="modal hidden">
        <div class="modal-content">
            <h3 style="margin-top:0">Allocate Crew</h3>
            <p id="a-name" style="font-weight:bold; color:var(--secondary)"></p>
            <label style="font-size:0.8rem; font-weight:bold;">Role Category:</label>
            <select id="a-cat"></select>
            <label style="font-size:0.8rem; font-weight:bold;">Specific Role:</label>
            <select id="a-role"></select>
            <button onclick="submitAlloc()" class="btn" style="margin-top:10px;">Confirm Allocation</button>
            <button onclick="closeModals()" style="width:100%; background:none; border:none; margin-top:10px; color:grey; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzYluQ9ADJKjNu_S8eke9xAG7qWvwDZcV9wllfrjub0KMZAeXLc-Pc0aE1i-7ID9DM7Vw/exec";
        let db = {}, isAdmin = false, currentMonth = "", activeTarget = {};

        function showLoading(show) {
            document.getElementById('loading-overlay').classList.toggle('hidden', !show);
        }

        function login() {
            const p = document.getElementById('pass').value;
            if(p === "RNLI" || p === "ADMIN123") {
                isAdmin = (p === "ADMIN123");
                if(isAdmin) document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                refresh();
            } else { alert("Incorrect Password"); }
        }

        async function refresh() {
            showLoading(true);
            try {
                const r = await fetch(API);
                db = await r.json();
                const months = [...new Set(db.sessions.map(s => s.month))];
                if(!currentMonth) currentMonth = months[0];
                render(months);
            } catch (e) {
                alert("Connection Error. Check Apps Script Deployment.");
            } finally { showLoading(false); }
        }

        function render(months) {
            document.getElementById('tabs').innerHTML = months.map(m => `
                <div class="tab ${m===currentMonth?'active':''}" onclick="currentMonth='${m}';render(['${months.join("','")}'])">${m}</div>
            `).join('');
            
            const sessions = db.sessions.filter(s => s.month === currentMonth);
            
            document.getElementById('h-row').innerHTML = `<th>Crew Name</th>` + sessions.map(s => `
                <th>
                    <div style="font-size:0.8rem">${new Date(s.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>
                    <div style="font-size:0.7rem; font-style:italic; font-weight:normal">${s.topic}</div>
                </th>
            `).join('');
            
            document.getElementById('b-rows').innerHTML = db.crew.map(name => `
                <tr>
                    <td>${name}</td>
                    ${sessions.map(s => {
                        const sig = db.signups.find(x => x.name == name && x.sessionId == s.id);
                        return `<td>${getCell(name, s.id, sig)}</td>`;
                    }).join('')}
                </tr>`).join('');
        }

        function getCell(name, sid, sig) {
            const action = isAdmin ? `onclick="openAlloc('${name}','${sid}')"` : `onclick="openSignup('${name}','${sid}')"`;
            
            if(!sig) return `<button class="cell-btn status-empty" ${action}>Sign Up</button>`;
            if(sig.allocatedCategory) {
                return `<button class="cell-btn status-allocated" ${isAdmin ? action : ''}>
                    <div class="alloc-cat">${sig.allocatedCategory}</div>
                    <div>${sig.allocatedRole}</div>
                </button>`;
            }
            return `<button class="cell-btn status-pending" ${action}>
                <div style="font-size:0.6rem">REQ:</div>
                <div style="font-weight:bold">${sig.preferred}</div>
            </button>`;
        }

        function openSignup(n, sid) {
            activeTarget = {n, sid};
            document.getElementById('s-title').innerText = "Sign Up: " + n;
            document.getElementById('s-cat').innerHTML = db.config.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('s-act').innerHTML = db.config.activities.map(a => `<option value="${a}">${a}</option>`).join('');
            document.getElementById('modal-signup').classList.remove('hidden');
        }

        function openAlloc(n, sid) {
            activeTarget = {n, sid};
            document.getElementById('a-name').innerText = n;
            document.getElementById('a-cat').innerHTML = db.config.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('a-role').innerHTML = db.config.roles.map(r => `<option value="${r}">${r}</option>`).join('');
            document.getElementById('modal-alloc').classList.remove('hidden');
        }

        async function submitSignup() {
            const data = { 
                action:"signup", 
                crewName:activeTarget.n, 
                sessionId:activeTarget.sid, 
                preferredRole:document.getElementById('s-cat').value, 
                activity:document.getElementById('s-act').value 
            };
            await send(data);
        }

        async function submitAlloc() {
            const data = { 
                action:"allocate", 
                crewName:activeTarget.n, 
                sessionId:activeTarget.sid, 
                roleType:document.getElementById('a-cat').value, 
                specificRole:document.getElementById('a-role').value 
            };
            await send(data);
        }

        async function addSession(e) {
            e.preventDefault();
            const data = { 
                action:"addSession", 
                date:document.getElementById('n-date').value, 
                time:document.getElementById('n-time').value, 
                topic:document.getElementById('n-topic').value, 
                month:document.getElementById('n-month').value 
            };
            if(!data.date || !data.topic) return alert("Fill in date and topic");
            await send(data);
        }

        async function send(data) {
            closeModals();
            showLoading(true);
            try {
                await fetch(API, { method: 'POST', body: JSON.stringify(data) });
                await refresh();
            } catch (e) {
                alert("Update failed.");
                showLoading(false);
            }
        }

        function closeModals() { 
            document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); 
        }
    </script>
</body>
</html>
