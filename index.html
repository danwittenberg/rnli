<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifeboat Training System</title>
    <style>
        :root { --primary: #002366; --secondary: #f05a28; --bg: #f4f7f6; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .hidden { display: none !important; }
        
        /* Login Styles */
        #login-screen { max-width: 400px; margin: 100px auto; text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input, select { padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .login-btn { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }

        /* Layout Styles */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .controls { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .tab { padding: 10px 20px; background: #fff; border: 1px solid #ddd; border-radius: 25px; cursor: pointer; white-space: nowrap; font-weight: 500; }
        .tab.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        
        /* Matrix Styles */
        .matrix-container { overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { border-collapse: collapse; width: 100%; font-size: 0.9rem; }
        th, td { border: 1px solid #edf2f7; padding: 10px; text-align: center; min-width: 140px; }
        th:first-child, td:first-child { position: sticky; left: 0; background: #fff; z-index: 10; font-weight: bold; border-right: 2px solid #cbd5e0; text-align: left; min-width: 160px; }
        
        /* Cell Buttons */
        .cell-btn { width: 100%; min-height: 55px; border: none; border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px; font-size: 0.8rem; }
        .status-empty { background: #f8fafc; color: #94a3b8; border: 1px dashed #cbd5e0; }
        .status-pending { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
        .status-allocated { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .alloc-cat { font-weight: 800; font-size: 0.65rem; text-transform: uppercase; border-bottom: 1px solid #86efac; margin-bottom: 3px; width: 100%; }
        
        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; max-width: 350px; width: 90%; }
        
        /* Admin Panel Styles */
        #admin-panel { background: #cbd5e0; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 2px solid var(--primary); }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: var(--primary)">Lifeboat Station Login</h2>
        <input type="password" id="station-pass" placeholder="Enter Password">
        <button class="login-btn" onclick="checkLogin()">Access Matrix</button>
        <p style="font-size: 0.8rem; color: #666; margin-top: 15px;">Crew use "RNLI", Admin use "ADMIN123"</p>
    </div>

    <div id="main-content" class="hidden">
        <header>
            <h2 style="margin:0">Training Matrix</h2>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--primary); cursor:pointer;">Logout</button>
        </header>

        <div id="admin-panel" class="hidden">
            <h3 style="margin-top:0">Admin: Add Training Session</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="new-id" placeholder="ID (e.g. S10)">
                <input type="text" id="new-month" placeholder="Month (e.g. June)">
                <input type="date" id="new-date">
                <input type="time" id="new-time">
                <input type="text" id="new-topic" placeholder="Topic/Label" style="grid-column: span 2;">
                <button type="button" onclick="submitNewSession(event)" class="login-btn" style="grid-column: span 2; background: var(--primary);">Add Session to Matrix</button>
            </div>
        </div>

        <div class="controls" id="month-tabs"></div>
        
        <div class="matrix-container">
            <table id="matrix">
                <thead><tr id="matrix-head"></tr></thead>
                <tbody id="matrix-body"></tbody>
            </table>
        </div>
    </div>

    <div id="signup-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="modal-title">Sign Up</h3>
            <label>Preferred Role:</label>
            <select id="select-cat" style="width: 100%"></select>
            <label>Specific Activity:</label>
            <select id="select-act" style="width: 100%"></select>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="closeModal()" style="flex: 1; padding: 10px; border: none; border-radius: 4px;">Cancel</button>
                <button id="submit-btn" onclick="submitSignup()" style="flex: 2; padding: 10px; background: var(--secondary); color: white; border: none; border-radius: 4px; font-weight: bold;">Confirm</button>
            </div>
        </div>
    </div>

    <div id="alloc-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 style="margin-top:0">Allocate Crew</h3>
            <p id="alloc-name" style="font-weight:bold; color:var(--secondary)"></p>
            <label>Allocated Category:</label>
            <select id="alloc-type" style="width:100%"></select>
            <label>Allocated Role:</label>
            <select id="alloc-role" style="width:100%"></select>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="closeAlloc()" style="flex: 1; padding: 10px; border: none; border-radius: 4px;">Cancel</button>
                <button id="alloc-submit-btn" onclick="submitAllocation()" style="flex: 2; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 4px; font-weight: bold;">Confirm Allocation</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const API_URL = "https://script.google.com/macros/s/AKfycbzYluQ9ADJKjNu_S8eke9xAG7qWvwDZcV9wllfrjub0KMZAeXLc-Pc0aE1i-7ID9DM7Vw/exec"; 
        const STATION_PASSWORD = "RNLI";
        const ADMIN_PASSWORD = "ADMIN123";

        let db = { crew: [], sessions: [], signups: [], config: { categories: [], activities: [], roles: [] } };
        let currentMonth = "";
        let isAdmin = false;
        let pendingSignup = { name: "", sessionId: "" };
        let pendingAlloc = { name: "", sessionId: "" };

        function checkLogin() {
            const pass = document.getElementById('station-pass').value;
            if (pass === STATION_PASSWORD || pass === ADMIN_PASSWORD) {
                if (pass === ADMIN_PASSWORD) {
                    isAdmin = true;
                    document.getElementById('admin-panel').classList.remove('hidden');
                }
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                fetchData();
            } else { alert("Incorrect Password"); }
        }

        async function fetchData() {
            try {
                const resp = await fetch(API_URL);
                db = await resp.json();
                const months = [...new Set(db.sessions.map(s => s.month))];
                if (!currentMonth) currentMonth = months[0];
                renderTabs(months);
                renderMatrix();
            } catch (e) {
                alert("Connection Error. Check your API URL.");
            }
        }

        function renderTabs(months) {
            document.getElementById('month-tabs').innerHTML = months.map(m => `
                <div class="tab ${m === currentMonth ? 'active' : ''}" onclick="setMonth('${m}')">${m}</div>
            `).join('');
        }

        function setMonth(m) {
            currentMonth = m;
            renderTabs([...new Set(db.sessions.map(s => s.month))]);
            renderMatrix();
        }

        function renderMatrix() {
            const sessions = db.sessions.filter(s => s.month === currentMonth);
            document.getElementById('matrix-head').innerHTML = `<th>Crew Name</th>` + sessions.map(s => `
                <th>
                    <div style="font-size:0.8rem">${new Date(s.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>
                    <div style="font-size:0.7rem; font-style:italic; font-weight:normal">${s.topic}</div>
                </th>
            `).join('');

            document.getElementById('matrix-body').innerHTML = db.crew.map(name => `
                <tr>
                    <td>${name}</td>
                    ${sessions.map(s => {
                        const signup = db.signups.find(sig => sig.name == name && sig.sessionId == s.id);
                        return `<td>${renderCell(name, s.id, signup)}</td>`;
                    }).join('')}
                </tr>
            `).join('');
        }

        function renderCell(name, sessionId, signup) {
            // ADMIN VIEW: Everything is clickable to Allocate
            if (isAdmin) {
                if (!signup) return `<button class="cell-btn status-empty" onclick="openAlloc('${name}', '${sessionId}')">Not In</button>`;
                if (signup.allocatedCategory) {
                    return `<button class="cell-btn status-allocated" onclick="openAlloc('${name}', '${sessionId}')">
                        <div class="alloc-cat">${signup.allocatedCategory}</div><div>${signup.allocatedRole}</div>
                    </button>`;
                }
                return `<button class="cell-btn status-pending" onclick="openAlloc('${name}', '${sessionId}')">Req: ${signup.preferred}</button>`;
            }

            // CREW VIEW
            if (!signup) return `<button class="cell-btn status-empty" onclick="handleSignup('${name}', '${sessionId}')">Sign Up</button>`;
            if (signup.allocatedCategory) {
                return `<div class="cell-btn status-allocated"><div class="alloc-cat">${signup.allocatedCategory}</div><div>${signup.allocatedRole}</div></div>`;
            }
            return `<button class="cell-btn status-pending" onclick="handleSignup('${name}', '${sessionId}')">Req: ${signup.preferred}<br><small>(Change)</small></button>`;
        }

        // SIGNUP LOGIC
        function handleSignup(name, sessionId) {
            pendingSignup = { name, sessionId };
            document.getElementById('modal-title').innerText = "Sign Up: " + name;
            document.getElementById('select-cat').innerHTML = db.config.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('select-act').innerHTML = db.config.activities.map(a => `<option value="${a}">${a}</option>`).join('');
            document.getElementById('signup-modal').classList.remove('hidden');
        }

        function submitSignup() {
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Saving..."; btn.disabled = true;
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "signup",
                    crewName: pendingSignup.name,
                    sessionId: pendingSignup.sessionId,
                    preferredRole: document.getElementById('select-cat').value,
                    activity: document.getElementById('select-act').value
                })
            }).then(() => { closeModal(); fetchData(); }).finally(() => { btn.innerText = "Confirm"; btn.disabled = false; });
        }

        // ADMIN ALLOCATION LOGIC
        function openAlloc(name, sessionId) {
            pendingAlloc = { name, sessionId };
            document.getElementById('alloc-name').innerText = name;
            document.getElementById('alloc-type').innerHTML = db.config.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('alloc-role').innerHTML = db.config.roles.map(r => `<option value="${r}">${r}</option>`).join('');
            document.getElementById('alloc-modal').classList.remove('hidden');
        }

        function submitAllocation() {
            const btn = document.getElementById('alloc-submit-btn');
            btn.innerText = "Allocating..."; btn.disabled = true;
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "allocate",
                    crewName: pendingAlloc.name,
                    sessionId: pendingAlloc.sessionId,
                    roleType: document.getElementById('alloc-type').value,
                    specificRole: document.getElementById('alloc-role').value
                })
            }).then(() => { closeAlloc(); fetchData(); }).finally(() => { btn.innerText = "Confirm Allocation"; btn.disabled = false; });
        }

        // ADMIN ADD SESSION LOGIC
        function submitNewSession(e) {
            e.preventDefault();
            const btn = e.target;
            btn.innerText = "Adding..."; btn.disabled = true;
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "addSession",
                    id: document.getElementById('new-id').value,
                    date: document.getElementById('new-date').value,
                    time: document.getElementById('new-time').value,
                    topic: document.getElementById('new-topic').value,
                    month: document.getElementById('new-month').value
                })
            }).then(() => { fetchData(); alert("Session Added"); }).finally(() => { btn.innerText = "Add Session to Matrix"; btn.disabled = false; });
        }

        function closeModal() { document.getElementById('signup-modal').classList.add('hidden'); }
        function closeAlloc() { document.getElementById('alloc-modal').classList.add('hidden'); }
    </script>
</body>
</html>
