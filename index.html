<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newhaven Lifeboat TPC</title>
  <style>
    :root {
      --rnli-orange: #E25B1D;
      --rnli-orange-hover: #C44A13;
      --rnli-navy: #002147;
      --rnli-navy-hover: #001530;
      --bg-main: #F4F6F8;
      --border-color: #D2D9E0;
      --text-main: #1A2B3C;
      --cat-preferred-bg: #FFF7F2;
      --cat-preferred-border: #F6AD82;
      --cat-preferred-text: #C44A13;
      --cat-allocated-bg: #EBF3FC;
      --cat-allocated-border: #7FAEE3;
      --cat-allocated-text: #002147;
      --cat-notraining-bg: #EAEFF4;
      --cat-notraining-border: #B8C5D0;
      --cat-notraining-text: #5A6E7F;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: BlinkMacSystemFont, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }

    body { background-color: var(--bg-main); color: var(--text-main); padding: 14px; }

    .container {
      max-width: 1450px; margin: 0 auto; background: white; padding: 18px; 
      border-radius: 6px; box-shadow: 0 4px 12px rgba(0, 33, 71, 0.08); border-top: 5px solid var(--rnli-orange);
    }

    header { margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 14px; }

    h1 { font-size: 1.4rem; font-weight: 800; color: var(--rnli-navy); text-transform: uppercase; letter-spacing: 0.5px; }

    .header-actions { display: flex; align-items: center; gap: 8px; }

    .refresh-btn { background-color: var(--rnli-orange); color: white; border: none; padding: 7px 14px; border-radius: 4px; cursor: pointer; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; transition: background 0.2s; }
    .refresh-btn:hover { background-color: var(--rnli-orange-hover); }

    .global-admin-btn { background: white; border: 2px solid var(--rnli-navy); color: var(--rnli-navy); font-size: 0.85rem; font-weight: 700; padding: 6px 14px; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
    .global-admin-btn:hover { background-color: #EBF3FC; }
    .global-admin-btn.unlocked { background-color: var(--rnli-navy); color: white; box-shadow: 0 0 0 2px rgba(0, 33, 71, 0.3); }

    .tabs-container { display: flex; gap: 6px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 5px; }
    .tab-btn { padding: 8px 16px; background-color: #EAEFF4; border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; font-weight: 700; font-size: 0.85rem; color: var(--rnli-navy); white-space: nowrap; text-transform: uppercase; }
    .tab-btn.active { background-color: var(--rnli-orange); color: white; border-color: var(--rnli-orange); }

    .matrix-wrapper { overflow-x: auto; max-height: 650px; overflow-y: auto; border: 2px solid var(--rnli-navy); border-radius: 4px; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; table-layout: fixed; }

    th, td { padding: 10px; border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); text-align: left; width: 160px; min-width: 160px; max-width: 160px; overflow: hidden; }

    th { background-color: var(--rnli-navy); color: white; font-weight: 700; position: sticky; top: 0; z-index: 100; height: 115px; vertical-align: top; }

    th:first-child, td:first-child { position: sticky; left: 0; width: 115px; min-width: 115px; max-width: 115px; background-color: #ffffff !important; z-index: 200; border-right: 3px solid var(--rnli-navy); }
    th:first-child { z-index: 300; background-color: var(--rnli-navy) !important; }

    .session-header-container { position: relative; height: 100%; display: flex; flex-direction: column; }
    .session-header-top { margin-bottom: 35px; }
    .session-header-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; word-break: break-word; }
    .session-header-meta { font-size: 0.72rem; color: #A4B9D0; margin-top: 2px; }

    .action-btn-row { position: absolute; bottom: 0; left: 0; right: 0; display: flex; gap: 4px; background-color: var(--rnli-navy); }
    .narrative-btn, .filter-arrow-btn { background-color: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 6px 5px; font-size: 0.68rem; border-radius: 3px; cursor: pointer; flex: 1; justify-content: center; display: inline-flex; }
    .filter-arrow-btn.active-filter { background-color: var(--rnli-orange); }

    .crew-name-cell { font-weight: 700; color: var(--rnli-navy); font-size: 0.78rem; display: flex; justify-content: space-between; align-items: center; }
    .crew-filter-btn { background: none; border: 1px solid var(--border-color); border-radius: 3px; cursor: pointer; font-size: 0.65rem; padding: 1px 3px; }
    .crew-filter-btn.active-filter { background-color: var(--rnli-navy); color: white; }

    .matrix-cell { cursor: pointer; vertical-align: top; background-color: #FFF; }
    .tile-box { padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); font-size: 0.78rem; width: 100%; }
    .tile-box.preferred { background-color: var(--cat-preferred-bg); border-left: 4px solid var(--rnli-orange); }
    .tile-box.allocated { background-color: var(--cat-allocated-bg); border-left: 4px solid var(--rnli-navy); }
    
    .hide-column { display: none !important; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 33, 71, 0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-card { background: white; padding: 24px; border-radius: 6px; width: 100%; max-width: 480px; border-top: 6px solid var(--rnli-navy); }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1 id="uiDashboardTitle">Crew Allocation Matrix</h1>
      <div class="header-actions">
        <button id="globalSheetBtn" class="global-admin-btn" style="display: none;" onclick="window.open('https://docs.google.com/spreadsheets/d/1pShwO5f9OiTReD3llwWMkrfHc1z405q3PP-m0-AbPIk/edit?usp=sharing', '_blank')">🟢 View Database</button>
        <button id="globalAdminBtn" class="global-admin-btn" onclick="toggleGlobalAdminMode()">LTC Mode</button>
        <button id="uiRefreshBtn" class="refresh-btn" onclick="fetchMatrixData()">Refresh</button>
      </div>
    </header>

    <div class="tabs-container" id="monthTabsPanel"></div>
    <div id="dashboardView"><div class="loading-shield">Assembling core data...</div></div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzYluQ9ADJKjNu_S8eke9xAG7qWvwDZcV9wllfrjub0KMZAeXLc-Pc0aE1i-7ID9DM7Vw/exec";
    const UI_TEXT = { dashboardTitle: "Newhaven TPC", crewTableHeaderLabel: "" }; // Removed label
    let state = { crew: [], sessions: [], signups: [], activeMonth: "", activeSessionFilterId: null, activeCrewFilterName: null };

    window.addEventListener("DOMContentLoaded", fetchMatrixData);

    function fetchMatrixData() {
      google.script.run.withSuccessHandler(processServerPayload).getMatrixDataPayload();
    }

    function processServerPayload(response) {
      state.crew = response.crew || [];
      state.sessions = response.sessions || [];
      state.signups = response.signups || [];
      const distinctMonths = [...new Set(state.sessions.map(s => s.month).filter(Boolean))];
      if (distinctMonths.length > 0) state.activeMonth = distinctMonths[0];
      renderMatrixGrid();
    }

    function renderMatrixGrid() {
      const activeSessions = state.sessions.filter(s => s.month === state.activeMonth);
      let html = `<div class="matrix-wrapper"><table><thead><tr><th></th>`; // First TH is now empty
      activeSessions.forEach(sess => {
        html += `<th><div class="session-header-container"><div class="session-header-top"><div class="session-header-title">${sess.topic}</div></div></div></th>`;
      });
      html += `</tr></thead><tbody>`;
      state.crew.forEach(name => {
        html += `<tr><td class="crew-name-cell">${name}</td>`;
        activeSessions.forEach(sess => {
            html += `<td class="matrix-cell"></td>`;
        });
        html += `</tr>`;
      });
      document.getElementById("dashboardView").innerHTML = html + `</tbody></table></div>`;
    }
  </script>
</body>
</html>
