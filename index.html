<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Training Matrix</title>
    <style>
        :root { --primary: #002366; --secondary: #f05a28; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .hidden { display: none !important; }
        
        #login-screen { max-width: 400px; margin: 100px auto; text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        
        input, select, textarea { padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; font-family: inherit; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .tab { padding: 10px 20px; background: #fff; border: 1px solid #ddd; border-radius: 25px; cursor: pointer; white-space: nowrap; font-weight: 500; }
        .tab.active { background: var(--secondary); color: white; border-color: var(--secondary); }

        .matrix-container { overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { border-collapse: collapse; width: 100%; font-size: 0.85rem; }
        th, td { border: 1px solid #edf2f7; padding: 12px; text-align: center; min-width: 150px; vertical-align: top; }
        th:first-child, td:first-child { position: sticky; left: 0; background: #fff; z-index: 10; font-weight: bold; border-right: 2px solid #cbd5e0; text-align: left; }

        .cell-btn { width: 100%; min-height: 80px; border: none; border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 8px; }
        .status-empty { background: #f8fafc; color: #94a3b8; border: 1px dashed #cbd5e0; justify-content: center; }
        .status-pending { background: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }
        .status-allocated { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }

        .role-title { font-weight: 800; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 4px; }
        .note-text { font-style: italic; font-size: 0.7rem; color: #64748b; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 350px; }
    </style>
</head>
<body>

    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p style="margin-top:15px; font-weight:bold; color:var(--primary)">Syncing with Station Database...</p>
    </div>

    <div id="login-screen">
        <h2 style="color:var(--primary); margin-bottom:25px;">Station Training Matrix</h2>
        <input type="password" id="pass" placeholder="Enter Station Password" onkeydown="if(event.key==='Enter')login()">
        <button class="btn" onclick="login()">Access System</button>
    </div>

    <div id="main-content" class="hidden">
        <div id="admin-panel" class="hidden" style="background:#e2e8f0; padding:20px; border-radius:8px; margin-bottom:20px;">
            <h3 style="margin:0 0 15px 0">Admin Panel: Create Session</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="date" id="n-date"> 
                <input type="time" id="n-time">
                <input type="text" id="n-topic" placeholder="Session Topic (e.g. Heavy Weather)" style="grid-column: span 2">
                <button onclick="addSession(event)" class="btn">Add to Calendar</button>
            </div>
        </div>

        <div class="controls" id="tabs"></div>
        
        <div class="matrix-container">
            <table>
                <thead><tr id="h-row"></tr></thead>
                <tbody id="b-rows"></tbody>
            </table>
        </div>
    </div>

    <div id="modal-signup" class="modal hidden">
        <div class="modal-content">
            <h3 id="s-title" style="margin-top:0"></h3>
            <label>I prefer to be:</label>
            <select id="s-cat">
                <option value="Afloat">Afloat</option>
                <option value="Ashore">Ashore</option>
                <option value="Either">Either</option>
            </select>
            <label>Training Notes (OCF, specific tasks, etc):</label>
            <textarea id="s-notes" rows="3" placeholder="e.g. Need to practice Nav..."></textarea>
            <button onclick="submitSignup()" class="btn" style="background:var(--secondary)">Submit Request</button>
            <button onclick="closeModals()" style="width:100%; background:none; border:none; margin-top:15px; color:#666; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div id="modal-alloc" class="modal hidden">
        <div class="modal-content">
            <h3 style="margin-top:0">Allocate Role</h3>
            <p id="a-name" style="font-weight:bold; color:var(--primary);"></p>
            <div id="a-pref-box" style="font-size:0.8rem; background:#fef3c7; padding:10px; border-radius:6px; margin-bottom:15px; border-left:4px solid #f59e0b;"></div>
            
            <label>Task Category:</label>
            <select id="a-cat">
                <option value="Afloat">Afloat</option>
                <option value="Ashore">Ashore</option>
            </select>
            <label>Specific Role:</label>
            <select id="a-role">
                <option value="ILB Helm">ILB Helm</option>
                <option value="ILB Crew">ILB Crew</option>
                <option value="ALB Coxswain">ALB Coxswain</option>
                <option value="ALB Mech">ALB Mech</option>
                <option value="ALB Nav">ALB Nav</option>
                <option value="ALB Crew">ALB Crew</option>
            </select>
            <button onclick="submitAlloc()" class="btn">Confirm Allocation</button>
            <button onclick="closeModals()" style="width:100%; background:none; border:none; margin-top:15px; color:#666; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzYluQ9ADJKjNu_S8eke9xAG7qWvwDZcV9wllfrjub0KMZAeXLc-Pc0aE1i-7ID9DM7Vw/exec";
        let db = {}, isAdmin = false, currentMonth = "", target = {};

        function showLoad(s) { document.getElementById('loading').classList.toggle('hidden', !s); }

        function login() {
            const p = document.getElementById('pass').value;
            if(p === "RNLI" || p === "ADMIN123") {
                isAdmin = (p === "ADMIN123");
                if(isAdmin) document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                refresh();
            } else { alert("Incorrect Password"); }
        }

        async function refresh() {
            showLoad(true);
            try {
                const r = await fetch(API);
                db = await r.json();
                const months = [...new Set(db.sessions.map(s => s.month))];
                if(!currentMonth) currentMonth = months[0];
                render(months);
            } catch (e) { console.error(e); alert("Database Error. Ensure your Web App is deployed as 'Anyone'."); }
            showLoad(false);
        }

        function render(months) {
            document.getElementById('tabs').innerHTML = months.map(m => `
                <div class="tab ${m===currentMonth?'active':''}" onclick="currentMonth='${m}';render(['${months.join("','")}'])">${m}</div>
            `).join('');
            
            const sessions = db.sessions.filter(s => s.month === currentMonth);
            document.getElementById('h-row').innerHTML = `<th>Crew Name</th>` + sessions.map(s => `
                <th>${new Date(s.date).toLocaleDateString('en-GB', {day:'numeric', month:'short'})}<br>
                <span style="font-weight:normal; font-size:0.75rem;">${s.topic}</span></th>
            `).join('');
            
            document.getElementById('b-rows').innerHTML = db.crew.map(name => `
                <tr>
                    <td>${name}</td>
                    ${sessions.map(s => {
                        const sig = db.signups.find(x => x.name == name && x.sessionId == s.id);
                        return `<td>${getCell(name, s.id, sig)}</td>`;
                    }).join('')}
                </tr>
            `).join('');
        }

        function getCell(name, sid, sig) {
            const act = isAdmin ? `onclick="openAlloc('${name}','${sid}')"` : `onclick="openSignup('${name}','${sid}')"`;
            if(!sig) return `<button class="cell-btn status-empty" ${act}>Sign Up</button>`;
            
            if(sig.allocatedCategory) {
                return `<button class="cell-btn status-allocated" ${act}>
                    <div class="role-title">${sig.allocatedRole}</div>
                    <div class="note-text">${sig.notes || ""}</div>
                </button>`;
            }
            
            return `<button class="cell-btn status-pending" ${act}>
                <div class="role-title">${sig.preferred}</div>
                <div class="note-text">${sig.notes || ""}</div>
            </button>`;
        }

        function openSignup(n, sid) {
            target = {n, sid};
            const sig = db.signups.find(x => x.name == n && x.sessionId == sid);
            document.getElementById('s-title').innerText = n;
            document.getElementById('s-cat').value = sig ? sig.preferred : "Afloat";
            document.getElementById('s-notes').value = sig ? sig.notes : "";
            document.getElementById('modal-signup').classList.remove('hidden');
        }

        function openAlloc(n, sid) {
            target = {n, sid};
            const sig = db.signups.find(x => x.name == n && x.sessionId == sid);
            document.getElementById('a-name').innerText = n;
            document.getElementById('a-pref-box').innerText = sig ? `Preference: ${sig.preferred}\nNotes: ${sig.notes || "None"}` : "Crew member has not signed up yet.";
            document.getElementById('modal-alloc').classList.remove('hidden');
        }

        async function submitSignup() {
            await send({ action:"signup", crewName:target.n, sessionId:target.sid, preferredRole:document.getElementById('s-cat').value, notes:document.getElementById('s-notes').value });
        }

        async function submitAlloc() {
            await send({ action:"allocate", crewName:target.n, sessionId:target.sid, roleType:document.getElementById('a-cat').value, specificRole:document.getElementById('a-role').value });
        }

        async function addSession(e) {
            e.preventDefault();
            const d = document.getElementById('n-date').value;
            const t = document.getElementById('n-topic').value;
            if(!d || !t) return alert("Date and Topic are required");
            await send({ action:"addSession", date:d, time:document.getElementById('n-time').value, topic:t });
        }

        async function send(data) {
            closeModals(); 
            showLoad(true);
            try {
                const response = await fetch(API, { method: 'POST', body: JSON.stringify(data) });
                const result = await response.text();
                console.log("Server Response:", result);
                await refresh();
            } catch (e) {
                console.error(e);
                alert("Communication Error. Try again.");
                showLoad(false);
            }
        }

        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); }
    </script>
</body>
</html>
