<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNLI Training Matrix</title>
    <style>
        :root { 
            --rnli-navy: #002366; 
            --rnli-orange: #f05a28; 
            --bg: #f4f7f6; 
            --border: #cbd5e0; 
            --green-bg: #dcfce7;
            --green-text: #166534;
            --green-border: #86efac;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 8px; color: #2d3748; font-size: 0.8rem; }
        .hidden { display: none !important; }

        /* Branding Header */
        #mode-header-banner { 
            background: var(--rnli-navy); 
            color: white; 
            padding: 12px; 
            text-align: center; 
            border-bottom: 4px solid var(--rnli-orange);
            margin: -8px -8px 10px -8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }

        /* Login Screen */
        #login-screen { max-width: 340px; margin: 80px auto; text-align: center; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--rnli-navy); }
        .btn { padding: 10px; background: var(--rnli-navy); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 8px; font-size: 0.8rem; }
        .btn-secondary { background: var(--rnli-orange); }
        .btn-danger { background: #dc2626; }
        .btn-outline { background: white; color: #666; border: 1px solid #ccc; }

        input, select, textarea { padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; font-size: 0.8rem; }

        .top-utility { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .logout-link { background: none; border: none; color: #e53e3e; cursor: pointer; font-size: 0.7rem; font-weight: bold; text-decoration: underline; padding: 0; }
        #last-update { font-size: 0.65rem; color: #718096; }

        .controls { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 8px; }
        .tab { padding: 6px 14px; background: #fff; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: 700; font-size: 0.75rem; color: var(--rnli-navy); }
        .tab.active { background: var(--rnli-orange); color: white; border-color: var(--rnli-orange); }
        
        /* Table Layout */
        .matrix-container { overflow: auto; background: white; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); max-height: 75vh; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; font-size: 0.78rem; }
        th { position: sticky; top: 0; background: #fff; z-index: 20; border-bottom: 2px solid var(--rnli-navy); padding: 8px; font-weight: 800; color: var(--rnli-navy); }
        td:first-child { position: sticky; left: 0; background: #f8fafc; z-index: 10; font-weight: bold; border-right: 2px solid var(--border); text-align: left; padding: 6px; color: var(--rnli-navy); }
        th:first-child { position: sticky; left: 0; top: 0; z-index: 30; background: #fff; }
        th, td { border: 1px solid #edf2f7; text-align: center; min-width: 120px; vertical-align: top; padding: 4px; }

        /* Status Tiles */
        .cell-btn { width: 100%; min-height: 52px; border: none; border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4px; position: relative; background: #fff; box-sizing: border-box; transition: transform 0.1s; }
        .cell-btn:active { transform: scale(0.96); }
        
        .status-empty { background: #f8fafc; color: #cbd5e1; border: 1px dashed #cbd5e0; }
        .status-pending { background: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }
        
        /* Unified Green for Allocated/Locked */
        .status-allocated, .status-locked { background: var(--green-bg); color: var(--green-text); border: 1px solid var(--green-border); }
        
        .status-no-training { background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e0; }
        
        .role-cat-label { font-size: 0.55rem; text-transform: uppercase; font-weight: 800; opacity: 0.7; line-height: 1; margin-bottom: 2px; }
        .role-title { font-weight: 800; font-size: 0.72rem; text-transform: uppercase; line-height: 1.1; }
        .note-text { font-style: italic; font-size: 0.62rem; color: #475569; line-height: 1.1; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .padlock { position: absolute; top: 2px; right: 3px; font-size: 0.6rem; opacity: 0.5; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,35,102,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(2px); }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 320px; max-width: 90%; border-top: 4px solid var(--rnli-orange); }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--rnli-orange); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading" class="hidden"><div class="spinner"></div></div>

    <div id="login-screen">
        <div style="font-weight: 900; color: var(--rnli-navy); margin-bottom: 5px;">RNLI</div>
        <h3 style="color:var(--rnli-navy); margin:0 0 15px 0;">Training Matrix</h3>
        <input type="password" id="pass" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
        <button class="btn" onclick="login()">Enter System</button>
    </div>

    <div id="main-content" class="hidden">
        <div id="mode-header-banner">LTC MODE</div>
        
        <div class="top-utility">
            <button onclick="logout()" class="logout-link">Logout / Change User</button>
            <div id="last-update">Syncing...</div>
        </div>

        <div id="admin-panel" class="hidden" style="background:#e2e8f0; padding:10px; border-radius:6px; margin-bottom:10px; border-left: 4px solid var(--rnli-navy);">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:6px;">
                <input type="date" id="n-date"> <input type="time" id="n-time">
                <input type="text" id="n-topic" placeholder="Session Topic (e.g. Navigation)" style="grid-column: span 2">
                <button onclick="addSession(event)" class="btn btn-secondary" style="grid-column: span 2; margin-bottom:0;">Create New Session</button>
            </div>
        </div>

        <div class="controls" id="tabs"></div>
        <div class="matrix-container">
            <table><thead><tr id="h-row"></tr></thead><tbody id="b-rows"></tbody></table>
        </div>
    </div>

    <div id="modal-signup" class="modal hidden">
        <div class="modal-content">
            <h4 id="s-title" style="margin:0 0 10px 0; color:var(--rnli-navy);"></h4>
            <div id="locked-notice" class="hidden" style="color:#dc2626; font-size:0.75rem; margin-bottom:10px; font-weight:bold;">🔒 Allocation Locked.</div>
            <div id="signup-fields">
                <label>Preference:</label>
                <select id="s-cat"><option value="Afloat">Afloat</option><option value="Ashore">Ashore</option><option value="Either">Either</option></select>
                <label>Notes (Optional):</label>
                <textarea id="s-notes" rows="2" placeholder="e.g. Helmet check-off needed"></textarea>
                <button onclick="submitSignup()" class="btn btn-secondary">Confirm Signup</button>
                <button id="btn-remove-signup" onclick="submitRemove()" class="btn btn-danger hidden">Remove Request</button>
            </div>
            <button onclick="closeModals()" class="btn btn-outline">Close</button>
        </div>
    </div>

    <div id="modal-alloc" class="modal hidden">
        <div class="modal-content">
            <h4 id="a-name" style="margin:0 0 10px 0; color:var(--rnli-navy);"></h4>
            <div id="a-pref-box" style="font-size:0.7rem; background:#fffbeb; padding:8px; border-radius:4px; margin-bottom:10px; border: 1px solid #fcd34d;"></div>
            <label>Category:</label>
            <select id="a-cat" onchange="toggleRoleDisable()"></select>
            <label id="a-role-label">Role:</label>
            <select id="a-role"></select>
            <button onclick="submitAlloc()" class="btn">Update Matrix</button>
            <button onclick="closeModals()" class="btn btn-outline">Cancel</button>
        </div>
    </div>

    <script>
        const API = "REPLACE_WITH_YOUR_DEPLOYED_URL"; 
        let db = { crew: [], sessions: [], signups: [], roles: [], categories: [] }, isAdmin = false, currentMonth = "", target = {};
        let refreshInterval = null;

        window.onload = () => {
            const savedRole = sessionStorage.getItem('matrixRole');
            if (savedRole) { isAdmin = (savedRole === 'admin'); initSystem(); }
        };

        function showLoad(s) { document.getElementById('loading').classList.toggle('hidden', !s); }
        function login() {
            const p = document.getElementById('pass').value;
            if (p === "RNLI" || p === "ADMIN123") {
                isAdmin = (p === "ADMIN123");
                sessionStorage.setItem('matrixRole', isAdmin ? 'admin' : 'crew');
                initSystem();
            } else { alert("Incorrect Password"); }
        }
        function logout() { sessionStorage.clear(); location.reload(); }

        function initSystem() {
            const header = document.getElementById('mode-header-banner');
            if (isAdmin) {
                header.innerText = "LTC Mode";
                header.style.background = "var(--rnli-navy)";
                document.getElementById('admin-panel').classList.remove('hidden');
            } else {
                header.innerText = "Crew Mode";
                header.style.background = "#2d3748"; // Slightly darker for crew
            }
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            refreshData();
            if (!refreshInterval) refreshInterval = setInterval(refreshData, 30000);
        }

        async function refreshData() {
            try {
                const response = await fetch(`${API}?t=${new Date().getTime()}`);
                db = await response.json();
                document.getElementById('a-role').innerHTML = '<option value="">-- Clear --</option>' + db.roles.map(r => `<option value="${r}">${r}</option>`).join('');
                document.getElementById('a-cat').innerHTML = '<option value="">-- Clear --</option>' + db.categories.map(c => `<option value="${c}">${c}</option>`).join('');
                const months = [...new Set(db.sessions.map(s => s.month))];
                if (!currentMonth || !months.includes(currentMonth)) currentMonth = months[0] || "";
                renderMatrix(months);
                document.getElementById('last-update').innerText = "Live • " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            } catch (err) { document.getElementById('last-update').innerText = "Sync Error..."; }
        }

        function renderMatrix(months) {
            document.getElementById('tabs').innerHTML = months.map(m => `<div class="tab ${m === currentMonth ? 'active' : ''}" onclick="currentMonth='${m}'; renderMatrix(['${months.join("','")}'])">${m}</div>`).join('');
            const sessions = db.sessions.filter(s => s.month === currentMonth);
            document.getElementById('h-row').innerHTML = `<th>Crew Member</th>` + sessions.map(s => `<th>${new Date(s.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}<br><span style="font-size:0.6rem; font-weight:normal;">${s.topic}</span></th>`).join('');
            document.getElementById('b-rows').innerHTML = db.crew.map(name => `<tr><td>${name}</td>${sessions.map(s => `<td>${getCellHTML(name, s.id)}</td>`).join('')}</tr>`).join('');
        }

        function getCellHTML(name, sid) {
            const sig = db.signups.find(x => x.name == name && x.sessionId == sid);
            const isAllocated = !!(sig && sig.allocatedCategory && sig.allocatedRole);
            let statusClass = 'status-empty', content = '<div class="role-title" style="color:#cbd5e1">—</div>';

            if (isAllocated) {
                if (sig.allocatedCategory === "No Training") {
                    statusClass = "status-no-training";
                    content = `<div class="padlock">🔒</div><div class="role-title">No Training</div>`;
                } else {
                    // Both Admin and Crew now see the "status-allocated" green style
                    statusClass = 'status-allocated';
                    content = `<div class="padlock">🔒</div><div class="role-cat-label">${sig.allocatedCategory}</div><div class="role-title">${sig.allocatedRole}</div><div class="note-text">${sig.notes || ""}</div>`;
                }
            } else if (sig) {
                statusClass = 'status-pending';
                content = `<div class="role-cat-label">Request</div><div class="role-title">${sig.preferred}</div><div class="note-text">${sig.notes || ""}</div>`;
            }
            return `<button class="cell-btn ${statusClass}" onclick="handleCellClick('${name}', '${sid}', ${isAllocated})">${content}</button>`;
        }

        function handleCellClick(name, sid, isAlloc) { if (isAdmin) openAlloc(name, sid); else openSignup(name, sid, isAlloc); }

        function openSignup(name, sid, isLocked) {
            target = { name, sessionId: sid };
            const sig = db.signups.find(x => x.name == name && x.sessionId == sid);
            document.getElementById('s-title').innerText = name;
            document.getElementById('locked-notice').classList.toggle('hidden', !isLocked);
            document.getElementById('signup-fields').classList.toggle('hidden', isLocked);
            document.getElementById('btn-remove-signup').classList.toggle('hidden', (!sig || isLocked));
            if (sig) { document.getElementById('s-cat').value = sig.preferred; document.getElementById('s-notes').value = sig.notes; }
            else { document.getElementById('s-cat').value = "Afloat"; document.getElementById('s-notes').value = ""; }
            document.getElementById('modal-signup').classList.remove('hidden');
        }

        function openAlloc(name, sid) {
            target = { name, sessionId: sid };
            const sig = db.signups.find(x => x.name == name && x.sessionId == sid);
            document.getElementById('a-name').innerText = name;
            document.getElementById('a-pref-box').innerText = sig ? `Request: ${sig.preferred}\nNotes: ${sig.notes || "None"}` : "No Request.";
            document.getElementById('a-cat').value = sig ? sig.allocatedCategory : "";
            document.getElementById('a-role').value = sig ? sig.allocatedRole : "";
            toggleRoleDisable();
            document.getElementById('modal-alloc').classList.remove('hidden');
        }

        function toggleRoleDisable() {
            const isNo = document.getElementById('a-cat').value === "No Training";
            document.getElementById('a-role').disabled = isNo;
            if (isNo) document.getElementById('a-role').value = "";
        }

        async function sendData(payload) {
            closeModals(); showLoad(true);
            try {
                await fetch(API, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });
                setTimeout(refreshData, 2500);
            } catch (err) { alert("Save Error"); }
            setTimeout(() => showLoad(false), 2500);
        }

        function submitSignup() { sendData({ action: "signup", crewName: target.name, sessionId: target.sessionId, preferredRole: document.getElementById('s-cat').value, notes: document.getElementById('s-notes').value }); }
        function submitRemove() { if(confirm("Remove request?")) sendData({ action: "remove", crewName: target.name, sessionId: target.sessionId }); }
        function submitAlloc() { sendData({ action: "allocate", crewName: target.name, sessionId: target.sessionId, roleType: document.getElementById('a-cat').value, specificRole: document.getElementById('a-role').value }); }
        function addSession(e) { e.preventDefault(); sendData({ action: "addSession", date: document.getElementById('n-date').value, time: document.getElementById('n-time').value, topic: document.getElementById('n-topic').value }); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); }
    </script>
</body>
</html>
