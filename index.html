<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifeboat Training Matrix</title>
    <style>
        :root { --primary: #002366; --secondary: #f05a28; --bg: #f4f7f6; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        .hidden { display: none !important; }
        
        /* Login Screen */
        #login-screen { max-width: 400px; margin: 80px auto; text-align: center; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input, select { padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; width: 100%; box-sizing: border-box; }
        .btn { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Tabs and Controls */
        .controls { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab { padding: 8px 16px; background: #fff; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9rem; }
        .tab.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        
        /* Table / Matrix */
        .matrix-container { overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { border-collapse: collapse; width: 100%; font-size: 0.85rem; }
        th, td { border: 1px solid #edf2f7; padding: 10px; text-align: center; min-width: 120px; }
        th:first-child, td:first-child { position: sticky; left: 0; background: #fff; z-index: 10; font-weight: bold; border-right: 2px solid #cbd5e0; text-align: left; min-width: 150px; }

        /* Cell Buttons */
        .cell-btn { width: 100%; min-height: 55px; border: none; border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; padding: 5px; }
        .status-empty { background: #f8fafc; color: #94a3b8; border: 1px dashed #ccc; }
        .status-pending { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
        .status-allocated { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .alloc-cat { font-weight: 800; font-size: 0.65rem; text-transform: uppercase; border-bottom: 1px solid #86efac; margin-bottom: 3px; width: 100%; }

        /* Modals */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 320px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); }

        /* Loading Spinner */
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content
