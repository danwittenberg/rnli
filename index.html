<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crew Allocation & Signup Matrix</title>
  <style>
    :root {
      --primary-color: #2b6cb0;
      --primary-hover: #2c5282;
      --bg-main: #f7fafc;
      --border-color: #e2e8f0;
      --text-main: #2d3748;
      
      --cat-preferred-bg: #fffaf0;
      --cat-preferred-border: #f6ad55;
      --cat-preferred-text: #dd6b20;
      
      --cat-allocated-bg: #ebf8ff;
      --cat-allocated-border: #4299e1;
      --cat-allocated-text: #2b6cb0;
      
      --cat-notraining-bg: #edf2f7;
      --cat-notraining-border: #cbd5e0;
      --cat-notraining-text: #718096;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      padding: 12px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    header {
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 12px;
    }

    h1 {
      font-size: 1.3rem;
      color: #1a202c;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .refresh-btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .refresh-btn:hover {
      background-color: var(--primary-hover);
    }

    /* LTC Mode Text Button Styling */
    .global-admin-btn {
      background: white;
      border: 1px solid #cbd5e0;
      color: #4a5568;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .global-admin-btn:hover {
      background-color: #edf2f7;
    }

    .global-admin-btn.unlocked {
      background-color: #feebc8;
      border-color: #f6ad55;
      color: #c05621;
      box-shadow: 0 0 0 2px rgba(246, 173, 85, 0.4);
    }

    .tabs-container {
      display: flex;
      gap: 6px;
      margin-bottom: 15px;
      overflow-x: auto;
      padding-bottom: 5px;
    }

    .tab-btn {
      padding: 8px 14px;
      background-color: #edf2f7;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.85rem;
      color: #4a5568;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background-color: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }

    .matrix-wrapper {
      overflow-x: auto;
      max-height: 600px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      text-align: left;
      min-width: 140px; 
    }

    th {
      background-color: #f7fafc;
      font-weight: 600;
      color: #4a5568;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    th:first-child, td:first-child {
      position: sticky;
      left: 0;
      width: 110px;      
      min-width: 110px;  
      max-width: 110px;  
      background-color: #fff;
      z-index: 11;
      border-right: 2px solid var(--border-color);
      word-break: break-word; 
      hyphens: auto;
    }

    th:first-child {
      z-index: 12;
      background-color: #f7fafc;
    }

    .session-header-title {
      font-size: 0.85rem;
      color: #1a202c;
      line-height: 1.2;
    }

    .session-header-meta {
      font-size: 0.72rem;
      color: #718096;
      margin-top: 4px;
      margin-bottom: 6px;
    }

    .narrative-btn-wrapper {
      margin-top: 2px;
    }

    .narrative-btn {
      background-color: #edf2f7;
      border: 1px solid #cbd5e0;
      color: #4a5568;
      padding: 2px 6px;
      font-size: 0.7rem;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      transition: all 0.2s;
    }

    .narrative-btn:hover {
      background-color: #e2e8f0;
      color: var(--primary-color);
      border-color: #a0aec0;
    }

    .crew-name-cell {
      font-weight: 600;
      color: #2d3748;
      font-size: 0.8rem; 
      line-height: 1.3;
    }

    .matrix-cell {
      cursor: pointer;
      transition: background 0.2s;
      vertical-align: top;
    }

    .matrix-cell:hover {
      background-color: #f7fafc;
    }

    .empty-tile {
      color: #a0aec0;
      font-size: 0.75rem;
      font-style: italic;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 44px;
    }

    .tile-box {
      padding: 6px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      font-size: 0.8rem;
      position: relative;
    }

    .tile-box.preferred {
      background-color: var(--cat-preferred-bg);
      border-color: var(--cat-preferred-border);
      color: var(--cat-preferred-text);
    }

    .tile-box.allocated {
      background-color: var(--cat-allocated-bg);
      border-color: var(--cat-allocated-border);
      color: var(--cat-allocated-text);
    }

    .tile-box.notraining {
      background-color: var(--cat-notraining-bg);
      border-color: var(--cat-notraining-border);
      color: var(--cat-notraining-text);
    }

    .tile-category-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 4px;
    }

    .tile-category {
      font-weight: 700;
      font-size: 0.78rem;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .tile-tooltip-indicator {
      font-size: 0.75rem;
      cursor: help;
      opacity: 0.8;
    }

    .tile-role {
      font-size: 0.75rem;
      font-weight: 500;
    }

    .tile-subcat {
      font-size: 0.72rem;
      font-style: italic;
      margin-top: 3px;
      padding-top: 3px;
      border-top: 1px dashed rgba(0, 0, 0, 0.08);
      opacity: 0.9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      padding: 10px;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .modal-header-wrapper {
      margin-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }

    .modal-title {
      font-size: 1.15rem;
      font-weight: 700;
    }

    .modal-subtitle {
      font-size: 0.82rem;
      color: #718096;
      margin-top: 2px;
    }

    .admin-notes-callout {
      background-color: #fffaf0;
      border: 1px dashed #f6ad55;
      padding: 8px;
      border-radius: 4px;
      font-size: 0.82rem;
      color: #c05621;
      line-height: 1.3;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #4a5568;
    }

    select, input, textarea {
      width: 100%;
      padding: 7px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-size: 0.85rem;
    }

    textarea {
      resize: vertical;
      height: 55px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 15px;
    }

    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .btn-secondary { background-color: #edf2f7; color: #4a5568; }
    .btn-primary { background-color: var(--primary-color); color: white; }
    .btn-danger { background-color: #e53e3e; color: white; }

    .loading-shield {
      text-align: center;
      padding: 30px;
      font-size: 1rem;
      color: #718096;
    }

    .narrative-textarea {
      width: 100%;
      height: 250px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.85rem;
      line-height: 1.4;
      padding: 10px;
      background-color: #f7fafc;
      border: 1px solid #cbd5e0;
      border-radius: 4px;
      color: #2d3748;
      resize: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div>
        <h1 id="uiDashboardTitle">Training Planning Calendar</h1>
      </div>
      <div class="header-actions">
        <button id="globalAdminBtn" class="global-admin-btn" onclick="toggleGlobalAdminMode()">LTC Mode</button>
        <button id="uiRefreshBtn" class="refresh-btn" onclick="fetchMatrixData()">Refresh Dashboard</button>
      </div>
    </header>

    <div class="tabs-container" id="monthTabsPanel"></div>

    <div id="dashboardView">
      <div class="loading-shield">Assembling core data feeds...</div>
    </div>
  </div>

  <div class="modal-overlay" id="actionModal">
    <div class="modal-card">
      <div class="modal-header-wrapper">
        <div class="modal-title" id="mCrewName">Crew Member</div>
        <div class="modal-subtitle" id="mSessionTitle">Session Specifics</div>
      </div>

      <div id="formSectionSignup">
        <div class="form-group">
          <label id="uiPrefChoiceLabel">Preference Choice</label>
          <select id="selectPrefRole"></select>
        </div>
        <div class="form-group">
          <label id="uiNotesLabel">Notes / Availability Details</label>
          <textarea id="inputNotes" placeholder="Any specific scheduling notes..."></textarea>
        </div>
        <div class="modal-actions">
          <button id="uiSignupRemoveBtn" class="btn btn-danger" onclick="executeAction('remove')">Clear / Withdraw</button>
          <button id="uiSignupCancelBtn" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button id="uiSignupSaveBtn" class="btn btn-primary" onclick="executeAction('signup')">Save Preference</button>
        </div>
      </div>

      <div id="formSectionAllocate" style="display: none;">
        <div class="form-group">
          <label id="uiSubmittedNotesLabel">Submitted Crew Availability Notes</label>
          <div id="adminNotesViewBox" class="admin-notes-callout">None</div>
        </div>

        <div class="form-group">
          <label id="uiAllocCategoryLabel">Allocated Category</label>
          <select id="selectCategory" onchange="checkNoTrainingRule(this)"></select>
        </div>
        <div class="form-group">
          <label id="uiAllocRoleLabel">Allocated Role</label>
          <select id="selectRole"></select>
        </div>
        <div class="form-group">
          <label id="uiAllocActivityLabel">Allocated Activity / Sub-Category</label>
          <input type="text" id="selectSubCategory" list="subCategoryOptions" placeholder="Select or type custom activity...">
          <datalist id="subCategoryOptions"></datalist>
        </div>
        <div class="modal-actions">
          <button id="uiAllocRemoveBtn" class="btn btn-danger" onclick="executeAction('remove')">Remove Allocation</button>
          <button id="uiAllocCancelBtn" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button id="uiAllocCommitBtn" class="btn btn-primary" style="background-color: #dd6b20;" onclick="executeAction('allocate')">Commit Allocation</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="narrativeModal">
    <div class="modal-card" style="max-width: 500px;">
      <div class="modal-header-wrapper">
        <div id="uiNarrativeTitle" class="modal-title">Generated Session Narrative</div>
        <div class="modal-subtitle" id="narrativeModalSubtitle">Overview Breakdown</div>
      </div>
      <div class="form-group">
        <textarea id="narrativeOutputText" class="narrative-textarea" readonly></textarea>
      </div>
      <div class="modal-actions">
        <button id="uiNarrativeCloseBtn" class="btn btn-secondary" onclick="closeNarrativeModal()">Close</button>
        <button id="uiNarrativeCopyBtn" class="btn btn-primary" onclick="copyNarrativeToClipboard()">Copy to Clipboard</button>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzYluQ9ADJKjNu_S8eke9xAG7qWvwDZcV9wllfrjub0KMZAeXLc-Pc0aE1i-7ID9DM7Vw/exec";
    const ADMIN_PASSWORD = "admin"; 

    // Centralized Dictionary for Easy Text Adjustments
    const UI_TEXT = {
      // Main Application Interface Labels
      dashboardTitle: "Crew Allocation Matrix",
      adminBtnText: "LTC Mode",
      adminUnlockTooltip: "Unlock LTC Mode",
      adminLockTooltip: "Lock LTC Mode",
      refreshBtn: "Refresh Dashboard",
      initialLoading: "Assembling core data feeds...",

      // Real-time Loading & Operational Feedback
      loadingFetch: "Pulling real-time parameters from Google Sheets...",
      loadingWrite: "Writing metrics to Google Sheets database ledger...",
      loadingTimeoutError: "Pipeline Execution Timeout or Configuration Error. Check Apps Script logs.",
      urlConfigError: "Configuration Error: Please paste your script deployment URL into the WEB_APP_URL constant.",

      // Matrix Grid View Dynamic Copy
      noSessionDates: "No session dates found.",
      noSessionsForMonth: "No sessions mapped to this month tab context.",
      noPersonnelCrew: "No personnel listed in Crew worksheet.",
      tileModify: "+ Click to Modify",
      tileSignUp: "+ Sign Up",
      tileFallbackCategory: "Preference",
      tileFallbackRole: "Unassigned",
      fallbackDayName: "Training Day",
      crewTableHeaderLabel: "Crew Member",

      // Interaction Modals General Buttons
      cancelBtn: "Cancel",
      removeBtn: "Clear / Withdraw",
      removeAllocBtn: "Remove Allocation",

      // Personnel Signup Modal Panel
      crewMemberFallback: "Crew Member",
      sessionSpecificsFallback: "Session Context Data Record",
      prefChoiceLabel: "Preference Choice",
      notesLabel: "Notes / Availability Details",
      notesPlaceholder: "Any specific scheduling notes...",
      savePrefBtn: "Save Preference",

      // Admin Allocation Modal Panel
      submittedNotesLabel: "Submitted Crew Availability Notes",
      noNotesAdminView: "No notes provided by crew member for this session.",
      allocCategoryLabel: "Allocated Category",
      allocRoleLabel: "Allocated Role",
      allocActivityLabel: "Allocated Activity / Sub-Category",
      allocActivityPlaceholder: "Select or type custom activity...",
      commitAllocBtn: "Commit Allocation",

      // Automated Narrative Output Modal
      narrativeTitle: "Generated Session Narrative",
      narrativeSubtitleFallback: "Overview Breakdown",
      closeBtn: "Close",
      copyClipboardBtn: "Copy to Clipboard",
      
      // Dialog / Prompt System Warnings
      narrativeSuccessAlert: "Narrative text block copied to clipboard successfully!",
      narrativeErrorAlert: "Cannot generate narrative dialogue.\nThe following crew members have signed up but have unallocated roles:\n\n",
      narrativeTemplateSegment1: "'s training will comprise of ",
      narrativeTemplateSegment2: " sessions.\n\n",
      narrativeSessionLabel: "Session",
      adminPromptChallenge: "Enter Administration System Password:",
      adminInvalidCredentials: "Invalid administrative credentials. Access Denied.",
      submissionDelayedAlert: "Submission Delayed: "
    };

    let state = {
      crew: [],
      sessions: [],
      categories: [],       
      roles: [],            
      adminCategories: [],  
      subCategories: [],    
      signups: [],
      activeMonth: "",
      selectedCrew: "",
      selectedSessionId: "",
      isGlobalAdminUnlocked: false
    };

    window.addEventListener("DOMContentLoaded", () => {
      applyStaticUIText();
      fetchMatrixData();
    });

    // Injects Centralized Config Text maps into DOM Structure layout directly
    function applyStaticUIText() {
      document.getElementById("uiDashboardTitle").textContent = UI_TEXT.dashboardTitle;
      
      const adminBtn = document.getElementById("globalAdminBtn");
      adminBtn.textContent = UI_TEXT.adminBtnText;
      adminBtn.title = UI_TEXT.adminUnlockTooltip;
      
      document.getElementById("uiRefreshBtn").textContent = UI_TEXT.refreshBtn;
      document.getElementById("dashboardView").innerHTML = `<div class="loading-shield">${UI_TEXT.initialLoading}</div>`;
      
      // Signup view panel bindings
      document.getElementById("uiPrefChoiceLabel").textContent = UI_TEXT.prefChoiceLabel;
      document.getElementById("uiNotesLabel").textContent = UI_TEXT.notesLabel;
      document.getElementById("inputNotes").placeholder = UI_TEXT.notesPlaceholder;
      document.getElementById("uiSignupRemoveBtn").textContent = UI_TEXT.removeBtn;
      document.getElementById("uiSignupCancelBtn").textContent = UI_TEXT.cancelBtn;
      document.getElementById("uiSignupSaveBtn").textContent = UI_TEXT.savePrefBtn;
      
      // Allocation view panel bindings
      document.getElementById("uiSubmittedNotesLabel").textContent = UI_TEXT.submittedNotesLabel;
      document.getElementById("uiAllocCategoryLabel").textContent = UI_TEXT.allocCategoryLabel;
      document.getElementById("uiAllocRoleLabel").textContent = UI_TEXT.allocRoleLabel;
      document.getElementById("uiAllocActivityLabel").textContent = UI_TEXT.allocActivityLabel;
      document.getElementById("selectSubCategory").placeholder = UI_TEXT.allocActivityPlaceholder;
      document.getElementById("uiAllocRemoveBtn").textContent = UI_TEXT.removeAllocBtn;
      document.getElementById("uiAllocCancelBtn").textContent = UI_TEXT.cancelBtn;
      document.getElementById("uiAllocCommitBtn").textContent = UI_TEXT.commitAllocBtn;
      
      // Narrative modal panel bindings
      document.getElementById("uiNarrativeTitle").textContent = UI_TEXT.narrativeTitle;
      document.getElementById("uiNarrativeCloseBtn").textContent = UI_TEXT.closeBtn;
      document.getElementById("uiNarrativeCopyBtn").textContent = UI_TEXT.copyClipboardBtn;
    }

    function fetchMatrixData() {
      document.getElementById("dashboardView").innerHTML = `<div class="loading-shield">${UI_TEXT.loadingFetch}</div>`;
      
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(processServerPayload)
          .withFailureHandler(handleNetworkError)
          .doGet();
      } else {
        if(WEB_APP_URL.includes("YOUR_APPS_SCRIPT")) {
          document.getElementById("dashboardView").innerHTML = `<div class="loading-shield" style="color:red;">${UI_TEXT.urlConfigError}</div>`;
          return;
        }
        fetch(WEB_APP_URL)
          .then(res => res.json())
          .then(processServerPayload)
          .catch(handleNetworkError);
      }
    }

    function handleNetworkError(err) {
      console.error(err);
      document.getElementById("dashboardView").innerHTML = `<div class="loading-shield" style="color:red;">${UI_TEXT.loadingTimeoutError}</div>`;
    }

    function processServerPayload(response) {
      if (typeof response === "string") {
        response = JSON.parse(response);
      }
      
      state.crew = response.crew || [];
      state.sessions = response.sessions || [];
      state.categories = response.categories || [];
      state.roles = response.roles || [];
      state.adminCategories = response.adminCategories || []; 
      state.subCategories = response.subCategories || [];
      state.signups = response.signups || [];

      const distinctMonths = [...new Set(state.sessions.map(s => s.month).filter(Boolean))];

      if (distinctMonths.length > 0 && (!state.activeMonth || !distinctMonths.includes(state.activeMonth))) {
        state.activeMonth = distinctMonths[0];
      }

      populateDropdownLists();
      renderMonthTabs(distinctMonths);
      renderMatrixGrid();
    }

    function populateDropdownLists() {
      populateSelectElement("selectCategory", state.adminCategories);
      populateSelectElement("selectRole", state.roles);
      
      const dl = document.getElementById("subCategoryOptions");
      dl.innerHTML = "";
      const activityTrackingList = state.subCategories.includes("No Training") ? state.subCategories : ["No Training", ...state.subCategories];
      activityTrackingList.forEach(item => {
        const option = document.createElement("option");
        option.value = item;
        dl.appendChild(option);
      });
      
      const prefSelect = document.getElementById("selectPrefRole");
      prefSelect.innerHTML = "";
      const filteredCategories = state.categories.filter(cat => cat !== "No Training");
      const prefOptions = ["Any", ...filteredCategories];
      prefOptions.forEach(item => {
        const option = document.createElement("option");
        option.value = item;
        option.textContent = item;
        prefSelect.appendChild(option);
      });
    }

    function populateSelectElement(id, list) {
      const select = document.getElementById(id);
      select.innerHTML = "";
      const trackingList = list.includes("No Training") ? list : ["No Training", ...list];
      trackingList.forEach(item => {
        const option = document.createElement("option");
        option.value = item;
        option.textContent = item;
        select.appendChild(option);
      });
    }

    function renderMonthTabs(months) {
      const panel = document.getElementById("monthTabsPanel");
      panel.innerHTML = "";

      if(months.length === 0) {
        panel.innerHTML = `<div style="font-style:italic; padding:10px;">${UI_TEXT.noSessionDates}</div>`;
        return;
      }

      months.forEach(m => {
        const btn = document.createElement("button");
        btn.className = `tab-btn ${state.activeMonth === m ? 'active' : ''}`;
        btn.textContent = m;
        btn.onclick = () => {
          state.activeMonth = m;
          renderMonthTabs(months);
          renderMatrixGrid();
        };
        panel.appendChild(btn);
      });
    }

    function renderMatrixGrid() {
      const view = document.getElementById("dashboardView");
      const activeSessions = state.sessions.filter(s => s.month === state.activeMonth);

      if (activeSessions.length === 0) {
        view.innerHTML = `<div class="loading-shield">${UI_TEXT.noSessionsForMonth}</div>`;
        return;
      }

      let html = `
        <div class="matrix-wrapper">
          <table>
            <thead>
              <tr>
                <th>${UI_TEXT.crewTableHeaderLabel}</th>
      `;

      activeSessions.forEach(sess => {
        html += `
          <th>
            <div class="session-header-title">${sess.topic || "Unnamed Session"}</div>
            <div class="session-header-meta">${sess.date} @ ${sess.time}</div>
            <div class="narrative-btn-wrapper">
              <button class="narrative-btn" onclick="triggerSessionNarrative('${sess.id}')">📋 Narrative</button>
            </div>
          </th>
        `;
      });

      html += `
              </tr>
            </thead>
            <tbody>
      `;

      if(state.crew.length === 0) {
        html += `<tr><td colspan="${activeSessions.length + 1}" style="text-align:center; font-style:italic;">${UI_TEXT.noPersonnelCrew}</td></tr>`;
      }

      state.crew.forEach(crewName => {
        html += `
          <tr>
            <td class="crew-name-cell">${crewName}</td>
        `;

        activeSessions.forEach(sess => {
          const match = state.signups.find(s => s.name === crewName && s.sessionId == sess.id);

          html += `
            <td class="matrix-cell" onclick="openInteractionModal('${escapeHtml(crewName)}', '${sess.id}')">
          `;

          if (match) {
            if (match.allocatedCategory && match.allocatedCategory !== "No Training") {
              const styleClass = match.allocatedCategory.toLowerCase().replace(/[^a-z0-9]/g, "") === "notraining" ? "notraining" : "allocated";
              
              html += `
                <div class="tile-box ${styleClass}">
                  <div class="tile-category-wrapper">
                    <div class="tile-category">${escapeHtml(match.allocatedCategory)}</div>
                    ${match.notes ? `<span class="tile-tooltip-indicator" title="Crew Note: ${escapeHtml(match.notes)}">📝</span>` : ''}
                  </div>
                  <div class="tile-role">${escapeHtml(match.allocatedRole || UI_TEXT.tileFallbackRole)}</div>
                  ${match.allocatedSubCategory ? `<div class="tile-subcat" title="${escapeHtml(match.allocatedSubCategory)}">${escapeHtml(match.allocatedSubCategory)}</div>` : ''}
                </div>
              `;
            } 
            else if (match.allocatedCategory === "No Training") {
              html += `
                <div class="tile-box notraining">
                  <div class="tile-category-wrapper">
                    <div class="tile-category">No Training</div>
                    ${match.notes ? `<span class="tile-tooltip-indicator" title="Crew Note: ${escapeHtml(match.notes)}">📝</span>` : ''}
                  </div>
                </div>
              `;
            }
            else if (match.preferred) {
              html += `
                <div class="tile-box preferred">
                  <div class="tile-category-wrapper">
                    <div class="tile-category">${UI_TEXT.tileFallbackCategory}</div>
                    ${match.notes ? `<span class="tile-tooltip-indicator" title="Crew Note: ${escapeHtml(match.notes)}">📝</span>` : ''}
                  </div>
                  <div class="tile-role">${escapeHtml(match.preferred)}</div>
                </div>
              `;
            } else {
              html += `<div class="empty-tile">${UI_TEXT.tileModify}</div>`;
            }
          } else {
            html += `<div class="empty-tile">${UI_TEXT.tileSignUp}</div>`;
          }

          html += `</td>`;
        });

        html += `</tr>`;
      });

      html += `
            </tbody>
          </table>
        </div>
      `;

      view.innerHTML = html;
    }

    function triggerSessionNarrative(sessionId) {
      const targetSess = state.sessions.find(s => s.id == sessionId);
      if(!targetSess) return;

      const sessionSignups = state.signups.filter(s => s.sessionId == sessionId);
      const unallocatedCrew = sessionSignups.filter(s => s.preferred && (!s.allocatedCategory || s.allocatedCategory.trim() === ""));
      
      if (unallocatedCrew.length > 0) {
        const namesList = unallocatedCrew.map(c => c.name).join(", ");
        alert(`${UI_TEXT.narrativeErrorAlert}${namesList}`);
        return;
      }

      const validAllocated = sessionSignups.filter(s => s.allocatedCategory && s.allocatedCategory !== "No Training" && s.allocatedCategory.trim() !== "");
      let dayName = targetSess.dayName || UI_TEXT.fallbackDayName;

      const allocationGroups = {};
      validAllocated.forEach(person => {
        const catKey = person.allocatedCategory;
        if (!allocationGroups[catKey]) {
          allocationGroups[catKey] = {
            subCategory: person.allocatedSubCategory || "General",
            crewList: []
          };
        }
        allocationGroups[catKey].crewList.push({
          name: person.name,
          role: person.allocatedRole || "Crew"
        });
      });

      const uniqueCategoryKeys = Object.keys(allocationGroups);
      const N = uniqueCategoryKeys.length;

      let textOutput = `${dayName}${UI_TEXT.narrativeTemplateSegment1}${N}${UI_TEXT.narrativeTemplateSegment2}`;

      uniqueCategoryKeys.forEach((categoryName, index) => {
        const currentGroup = allocationGroups[categoryName];
        textOutput += `${UI_TEXT.narrativeSessionLabel} ${index + 1}: ${categoryName} (${currentGroup.subCategory})\n`;
        
        currentGroup.crewList.forEach(crewMember => {
          textOutput += `${crewMember.name} (${crewMember.role})\n`;
        });
        
        textOutput += `\n`;
      });

      document.getElementById("narrativeModalSubtitle").textContent = `${targetSess.topic || 'Session'} Summary`;
      document.getElementById("narrativeOutputText").value = textOutput.trim();
      document.getElementById("narrativeModal").classList.add("open");
    }

    function closeNarrativeModal() {
      document.getElementById("narrativeModal").classList.remove("open");
    }

    function copyNarrativeToClipboard() {
      const copyTextEl = document.getElementById("narrativeOutputText");
      copyTextEl.select();
      copyTextEl.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(copyTextEl.value);
      alert(UI_TEXT.narrativeSuccessAlert);
    }

    function openInteractionModal(crewName, sessionId) {
      state.selectedCrew = crewName;
      state.selectedSessionId = sessionId;

      if (state.isGlobalAdminUnlocked) {
        document.getElementById("formSectionSignup").style.display = "none";
        document.getElementById("formSectionAllocate").style.display = "block";
      } else {
        document.getElementById("formSectionSignup").style.display = "block";
        document.getElementById("formSectionAllocate").style.display = "none";
      }

      const targetSess = state.sessions.find(s => s.id == sessionId);
      const existingMatch = state.signups.find(s => s.name === crewName && s.sessionId == sessionId);

      document.getElementById("mCrewName").textContent = crewName || UI_TEXT.crewMemberFallback;
      document.getElementById("mSessionTitle").textContent = targetSess ? `${targetSess.topic} (${targetSess.date} @ ${targetSess.time})` : UI_TEXT.sessionSpecificsFallback;

      const adminBox = document.getElementById("adminNotesViewBox");
      if (existingMatch && existingMatch.notes && existingMatch.notes.trim() !== "") {
        adminBox.textContent = `"${existingMatch.notes}"`;
        adminBox.style.fontStyle = "normal";
        adminBox.style.color = "#c05621";
      } else {
        adminBox.textContent = UI_TEXT.noNotesAdminView;
        adminBox.style.fontStyle = "italic";
        adminBox.style.color = "#718096";
      }

      document.getElementById("selectPrefRole").value = (existingMatch && existingMatch.preferred) ? existingMatch.preferred : "Any";
      document.getElementById("inputNotes").value = (existingMatch && existingMatch.notes) ? existingMatch.notes : "";
      
      document.getElementById("selectCategory").value = (existingMatch && existingMatch.allocatedCategory) ? existingMatch.allocatedCategory : "No Training";
      document.getElementById("selectRole").value = (existingMatch && existingMatch.allocatedRole) ? existingMatch.allocatedRole : "No Training";
      document.getElementById("selectSubCategory").value = (existingMatch && existingMatch.allocatedSubCategory) ? existingMatch.allocatedSubCategory : "No Training";

      document.getElementById("actionModal").classList.add("open");
    }

    function closeModal() {
      document.getElementById("actionModal").classList.remove("open");
    }

    function toggleGlobalAdminMode() {
      const btn = document.getElementById("globalAdminBtn");
      
      if (state.isGlobalAdminUnlocked) {
        state.isGlobalAdminUnlocked = false;
        btn.classList.remove("unlocked");
        btn.title = UI_TEXT.adminUnlockTooltip;
      } else {
        const inputPass = prompt(UI_TEXT.adminPromptChallenge);
        if (inputPass === ADMIN_PASSWORD) {
          state.isGlobalAdminUnlocked = true;
          btn.classList.add("unlocked");
          btn.title = UI_TEXT.adminLockTooltip;
        } else if (inputPass !== null) {
          alert(UI_TEXT.adminInvalidCredentials);
        }
      }
    }

    function checkNoTrainingRule(elem) {
      if(elem.value === "No Training") {
        document.getElementById("selectRole").value = "No Training";
        document.getElementById("selectSubCategory").value = "No Training";
      }
    }

    function executeAction(actionType) {
      let payload = {
        action: actionType,
        sessionId: state.selectedSessionId,
        crewName: state.selectedCrew
      };

      if (actionType === "signup") {
        payload.preferredRole = document.getElementById("selectPrefRole").value;
        payload.notes = document.getElementById("inputNotes").value.trim();
      } 
      else if (actionType === "allocate") {
        payload.roleType = document.getElementById("selectCategory").value;
        payload.specificRole = document.getElementById("selectRole").value;
        payload.subCategory = document.getElementById("selectSubCategory").value.trim();
      }

      closeModal();
      document.getElementById("dashboardView").innerHTML = `<div class="loading-shield">${UI_TEXT.loadingWrite}</div>`;

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler((result) => { 
            if (result && result.status === "error") {
              alert(UI_TEXT.submissionDelayedAlert + result.message + "\n\nPlease try again in a few moments.");
            }
            fetchMatrixData(); 
          })
          .withFailureHandler(handleNetworkError)
          .doPost(JSON.stringify(payload));
      } else {
        fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify(payload),
          headers: { "Content-Type": "text/plain;charset=utf-8" }
        })
        .then(res => res.json())
        .then((result) => { 
          if (result && result.status === "error") {
            alert(UI_TEXT.submissionDelayedAlert + result.message + "\n\nPlease try again in a few moments.");
          }
          fetchMatrixData(); 
        })
        .catch(handleNetworkError);
      }
    }

    function escapeHtml(str) {
      if(!str) return "";
      return str.toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
