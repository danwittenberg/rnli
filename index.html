<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crew Allocation & Signup Matrix</title>
  <style>
    :root {
      --primary-color: #2b6cb0;
      --primary-hover: #2c5282;
      --bg-main: #f7fafc;
      --border-color: #e2e8f0;
      --text-main: #2d3748;
      
      /* Allocation Category Colors */
      --cat-preferred-bg: #fffaf0;
      --cat-preferred-border: #f6ad55;
      --cat-preferred-text: #dd6b20;
      
      --cat-allocated-bg: #ebf8ff;
      --cat-allocated-border: #4299e1;
      --cat-allocated-text: #2b6cb0;
      
      --cat-notraining-bg: #edf2f7;
      --cat-notraining-border: #cbd5e0;
      --cat-notraining-text: #718096;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    header {
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 15px;
    }

    h1 {
      font-size: 1.5rem;
      color: #1a202c;
    }

    .refresh-btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    .refresh-btn:hover {
      background-color: var(--primary-hover);
    }

    /* Tabs Panel */
    .tabs-container {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 5px;
    }

    .tab-btn {
      padding: 10px 20px;
      background-color: #edf2f7;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      color: #4a5568;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background-color: var(--primary-color);
      color: white;
      border-color: var(--primary-color);
    }

    /* Table Matrix Grid Configuration */
    .matrix-wrapper {
      overflow-x: auto;
      max-height: 650px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      text-align: left;
      min-width: 180px;
    }

    th {
      background-color: #f7fafc;
      font-weight: 600;
      color: #4a5568;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    /* Sticky First Column (Crew Names) */
    th:first-child, td:first-child {
      position: sticky;
      left: 0;
      width: 180px;
      min-width: 180px;
      background-color: #fff;
      z-index: 11;
      border-right: 2px solid var(--border-color);
    }

    th:first-child {
      z-index: 12;
      background-color: #f7fafc;
    }

    .session-header-title {
      font-size: 0.95rem;
      color: #1a202c;
    }

    .session-header-meta {
      font-size: 0.75rem;
      color: #718096;
      margin-top: 4px;
    }

    .crew-name-cell {
      font-weight: 600;
      color: #2d3748;
    }

    /* Allocation Interaction Tiles */
    .matrix-cell {
      cursor: pointer;
      transition: background 0.2s;
    }

    .matrix-cell:hover {
      background-color: #f7fafc;
    }

    .empty-tile {
      color: #a0aec0;
      font-size: 0.8rem;
      font-style: italic;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 50px;
    }

    .tile-box {
      padding: 8px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
      font-size: 0.85rem;
    }

    .tile-box.preferred {
      background-color: var(--cat-preferred-bg);
      border-color: var(--cat-preferred-border);
      color: var(--cat-preferred-text);
    }

    .tile-box.allocated {
      background-color: var(--cat-allocated-bg);
      border-color: var(--cat-allocated-border);
      color: var(--cat-allocated-text);
    }

    .tile-box.notraining {
      background-color: var(--cat-notraining-bg);
      border-color: var(--cat-notraining-border);
      color: var(--cat-notraining-text);
    }

    .tile-category {
      font-weight: 700;
      font-size: 0.85rem;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tile-role {
      font-size: 0.8rem;
      font-weight: 500;
    }

    .tile-subcat {
      font-size: 0.75rem;
      font-style: italic;
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px dashed rgba(0, 0, 0, 0.08);
      opacity: 0.9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Modal / Action Dialog Box Window */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .modal-header {
      margin-bottom: 15px;
    }

    .modal-title {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .modal-subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-top: 2px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 5px;
      color: #4a5568;
    }

    select, input, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-size: 0.9rem;
    }

    textarea {
      resize: vertical;
      height: 60px;
    }

    .modal-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 15px;
    }

    .modal-tab-btn {
      flex: 1;
      padding: 8px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-weight: 600;
      color: #718096;
    }

    .modal-tab-btn.active {
      color: var(--primary-color);
      border-bottom-color: var(--primary-color);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .btn-secondary { background-color: #edf2f7; color: #4a5568; }
    .btn-primary { background-color: var(--primary-color); color: white; }
    .btn-danger { background-color: #e53e3e; color: white; }

    .loading-shield {
      text-align: center;
      padding: 40px;
      font-size: 1.1rem;
      color: #718096;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div>
        <h1>Crew Allocation Matrix</h1>
      </div>
      <button class="refresh-btn" onclick="fetchMatrixData()">Refresh Dashboard</button>
    </header>

    <div class="tabs-container" id="monthTabsPanel"></div>

    <div id="dashboardView">
      <div class="loading-shield">Assembling core data feeds...</div>
    </div>
  </div>

  <div class="modal-overlay" id="actionModal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title" id="mCrewName">Crew Member</div>
        <div class="modal-subtitle" id="mSessionTitle">Session Specifics</div>
      </div>

      <div class="modal-tabs">
        <button class="modal-tab-btn active" onclick="switchModalTab('signup')">Sign Up/Preference</button>
        <button class="modal-tab-btn" onclick="switchModalTab('allocate')">Allocation (Admin)</button>
      </div>

      <div id="formSectionSignup">
        <div class="form-group">
          <label>Preference</label>
          <select id="selectPrefRole"></select>
        </div>
        <div class="form-group">
          <label>Notes / Availability Details</label>
          <textarea id="inputNotes" placeholder="Any specific scheduling notes..."></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn btn-danger" onclick="executeAction('remove')">Clear / Withdraw</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="executeAction('signup')">Save Preference</button>
        </div>
      </div>

      <div id="formSectionAllocate" style="display: none;">
        <div class="form-group">
          <label>Allocated Category</label>
          <select id="selectCategory" onchange="checkNoTrainingRule(this)"></select>
        </div>
        <div class="form-group">
          <label>Allocated Role</label>
          <select id="selectRole"></select>
        </div>
        <div class="form-group">
          <label>Allocated Activity (Sub-Category)</label>
          <select id="selectSubCategory"></select>
        </div>
        <div class="modal-actions">
          <button class="btn btn-danger" onclick="executeAction('remove')">Remove Allocation</button>
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="executeAction('allocate')">Commit Allocation</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // CRUCIAL STEP: Replace with your actual deployment script URL
    const WEB_APP_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE";

    // Application Global State Context Data Container
    let state = {
      crew: [],
      sessions: [],
      categories: [],       // Column A (Used for User Preference Options)
      adminCategories: [],  // Column D (Used for Admin Allocation Categories)
      roles: [],            // Column B
      subCategories: [],    // Column C
      signups: [],
      activeMonth: "",
      selectedCrew: "",
      selectedSessionId: ""
    };

    /**
     * Initializes engine and requests sheets state parameters.
     */
    window.addEventListener("DOMContentLoaded", () => {
      fetchMatrixData();
    });

    /**
     * Dispatches network pull to fetch the state matrix payload.
     */
    function fetchMatrixData() {
      document.getElementById("dashboardView").innerHTML = '<div class="loading-shield">Pulling real-time parameters from Google Sheets...</div>';
      
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(processServerPayload)
          .withFailureHandler(handleNetworkError)
          .doGet();
      } else {
        if(WEB_APP_URL.includes("YOUR_APPS_SCRIPT")) {
          document.getElementById("dashboardView").innerHTML = '<div class="loading-shield" style="color:red;">Configuration Error: Please paste your script deployment URL into the WEB_APP_URL string constant at the top of the HTML file.</div>';
          return;
        }
        fetch(WEB_APP_URL)
          .then(res => res.json())
          .then(processServerPayload)
          .catch(handleNetworkError);
      }
    }

    function handleNetworkError(err) {
      console.error(err);
      document.getElementById("dashboardView").innerHTML = '<div class="loading-shield" style="color:red;">Pipeline Execution Timeout or Configuration Error. Check Apps Script logs.</div>';
    }

    /**
     * Processes JSON responses and dynamically isolates distinct calendar months.
     */
    function processServerPayload(response) {
      if (typeof response === "string") {
        response = JSON.parse(response);
      }
      
      state.crew = response.crew || [];
      state.sessions = response.sessions || [];
      state.categories = response.categories || [];
      state.adminCategories = response.adminCategories || []; // Pulls custom Column D stream
      state.roles = response.roles || [];
      state.subCategories = response.subCategories || [];
      state.signups = response.signups || [];

      const distinctMonths = [...new Set(state.sessions.map(s => s.month))];

      if (distinctMonths.length > 0 && (!state.activeMonth || !distinctMonths.includes(state.activeMonth))) {
        state.activeMonth = distinctMonths[0];
      }

      populateDropdownLists();
      renderMonthTabs(distinctMonths);
      renderMatrixGrid();
    }

    /**
     * Populates drop-down selectors inside the configuration modal cards.
     */
    function populateDropdownLists() {
      // Admin Category dropdown menu bound to Column D array (falls back to column A safely if missing)
      const adminCatSource = (state.adminCategories && state.adminCategories.length > 0) ? state.adminCategories : state.categories;
      populateSelectElement("selectCategory", adminCatSource);
      
      populateSelectElement("selectRole", state.roles);
      populateSelectElement("selectSubCategory", state.subCategories);
      
      // Build User Preference dropdown menu bounded to Config Column A Categories
      const prefSelect = document.getElementById("selectPrefRole");
      prefSelect.innerHTML = "";
      
      const filteredCategories = state.categories.filter(cat => cat !== "No Training");
      const prefOptions = ["Any", ...filteredCategories];
      
      prefOptions.forEach(item => {
        const option = document.createElement("option");
        option.value = item;
        option.textContent = item;
        prefSelect.appendChild(option);
      });
    }

    function populateSelectElement(id, list) {
      const select = document.getElementById(id);
      select.innerHTML = "";
      
      const trackingList = list.includes("No Training") ? list : ["No Training", ...list];
      
      trackingList.forEach(item => {
        const option = document.createElement("option");
        option.value = item;
        option.textContent = item;
        select.appendChild(option);
      });
    }

    /**
     * Renders top month navigation tabs.
     */
    function renderMonthTabs(months) {
      const panel = document.getElementById("monthTabsPanel");
      panel.innerHTML = "";

      if(months.length === 0) {
        panel.innerHTML = '<div style="font-style:italic; padding:10px;">No session dates found.</div>';
        return;
      }

      months.forEach(m => {
        const btn = document.createElement("button");
        btn.className = `tab-btn ${state.activeMonth === m ? 'active' : ''}`;
        btn.textContent = m;
        btn.onclick = () => {
          state.activeMonth = m;
          renderMonthTabs(months);
          renderMatrixGrid();
        };
        panel.appendChild(btn);
      });
    }

    /**
     * Generates the cross-reference grid table for the active month.
     */
    function renderMatrixGrid() {
      const view = document.getElementById("dashboardView");
      const activeSessions = state.sessions.filter(s => s.month === state.activeMonth);

      if (activeSessions.length === 0) {
        view.innerHTML = '<div class="loading-shield">No sessions discovered mapping to this month tab context index parameters.</div>';
        return;
      }

      let html = `
        <div class="matrix-wrapper">
          <table>
            <thead>
              <tr>
                <th>Crew Member</th>
      `;

      activeSessions.forEach(sess => {
        html += `
          <th>
            <div class="session-header-title">${sess.topic || "Unnamed Session"}</div>
            <div class="session-header-meta">${formatDisplayDate(sess.date)} @ ${sess.time}</div>
          </th>
        `;
      });

      html += `
              </tr>
            </thead>
            <tbody>
      `;

      if(state.crew.length === 0) {
        html += `<tr><td colspan="${activeSessions.length + 1}" style="text-align:center; font-style:italic;">No personnel listed in Crew worksheet.</td></tr>`;
      }

      state.crew.forEach(crewName => {
        html += `
          <tr>
            <td class="crew-name-cell">${crewName}</td>
        `;

        activeSessions.forEach(sess => {
          const match = state.signups.find(s => s.name === crewName && s.sessionId == sess.id);

          html += `
            <td class="matrix-cell" onclick="openInteractionModal('${escapeHtml(crewName)}', '${sess.id}')">
          `;

          if (match) {
            if (match.allocatedCategory && match.allocatedCategory !== "No Training") {
              const styleClass = match.allocatedCategory.toLowerCase().replace(/[^a-z0-9]/g, "") === "notraining" ? "notraining" : "allocated";
              
              html += `
                <div class="tile-box ${styleClass}">
                  <div class="tile-category">${escapeHtml(match.allocatedCategory)}</div>
                  <div class="tile-role">${escapeHtml(match.allocatedRole || 'Unassigned')}</div>
                  ${match.allocatedSubCategory ? `<div class="tile-subcat" title="${escapeHtml(match.allocatedSubCategory)}">${escapeHtml(match.allocatedSubCategory)}</div>` : ''}
                </div>
              `;
            } 
            else if (match.allocatedCategory === "No Training") {
              html += `
                <div class="tile-box notraining">
                  <div class="tile-category">No Training</div>
                </div>
              `;
            }
            else if (match.preferred) {
              html += `
                <div class="tile-box preferred">
                  <div class="tile-category">Preference</div>
                  <div class="tile-role">${escapeHtml(match.preferred)}</div>
                  ${match.notes ? `<div class="tile-subcat" title="${escapeHtml(match.notes)}">Notes: ${escapeHtml(match.notes)}</div>` : ''}
                </div>
              `;
            } else {
              html += `<div class="empty-tile">+ Click to Modify</div>`;
            }
          } else {
            html += `<div class="empty-tile">+ Sign Up</div>`;
          }

          html += `</td>`;
        });

        html += `</tr>`;
      });

      html += `
            </tbody>
          </table>
        </div>
      `;

      view.innerHTML = html;
    }

    /**
     * Opens interface action wizard window card.
     */
    function openInteractionModal(crewName, sessionId) {
      state.selectedCrew = crewName;
      state.selectedSessionId = sessionId;

      const targetSess = state.sessions.find(s => s.id == sessionId);
      const existingMatch = state.signups.find(s => s.name === crewName && s.sessionId == sessionId);

      document.getElementById("mCrewName").textContent = crewName;
      document.getElementById("mSessionTitle").textContent = targetSess ? `${targetSess.topic} (${formatDisplayDate(targetSess.date)} @ ${targetSess.time})` : "Session Context Data Record";

      // Hydrate forms with existing spreadsheet values or defaults
      document.getElementById("selectPrefRole").value = (existingMatch && existingMatch.preferred) ? existingMatch.preferred : "Any";
      document.getElementById("inputNotes").value = (existingMatch && existingMatch.notes) ? existingMatch.notes : "";
      
      document.getElementById("selectCategory").value = (existingMatch && existingMatch.allocatedCategory) ? existingMatch.allocatedCategory : "No Training";
      document.getElementById("selectRole").value = (existingMatch && existingMatch.allocatedRole) ? existingMatch.allocatedRole : "No Training";
      document.getElementById("selectSubCategory").value = (existingMatch && existingMatch.allocatedSubCategory) ? existingMatch.allocatedSubCategory : "No Training";

      switchModalTab('signup');
      document.getElementById("actionModal").classList.add("open");
    }

    function closeModal() {
      document.getElementById("actionModal").classList.remove("open");
    }

    function switchModalTab(tab) {
      const tabButtons = document.querySelectorAll(".modal-tab-btn");
      if(tab === 'signup') {
        tabButtons[0].classList.add("active");
        tabButtons[1].classList.remove("active");
        document.getElementById("formSectionSignup").style.display = "block";
        document.getElementById("formSectionAllocate").style.display = "none";
      } else {
        tabButtons[0].classList.remove("active");
        tabButtons[1].classList.add("active");
        document.getElementById("formSectionSignup").style.display = "none";
        document.getElementById("formSectionAllocate").style.display = "block";
      }
    }

    function checkNoTrainingRule(elem) {
      if(elem.value === "No Training") {
        document.getElementById("selectRole").value = "No Training";
        document.getElementById("selectSubCategory").value = "No Training";
      }
    }

    /**
     * Package and transmit transaction data payloads to the backend API macro scripts.
     */
    function executeAction(actionType) {
      let payload = {
        action: actionType,
        sessionId: state.selectedSessionId,
        crewName: state.selectedCrew
      };

      if (actionType === "signup") {
        payload.preferredRole = document.getElementById("selectPrefRole").value;
        payload.notes = document.getElementById("inputNotes").value.trim();
      } 
      else if (actionType === "allocate") {
        payload.roleType = document.getElementById("selectCategory").value;
        payload.specificRole = document.getElementById("selectRole").value;
        payload.subCategory = document.getElementById("selectSubCategory").value;
      }

      closeModal();
      document.getElementById("dashboardView").innerHTML = '<div class="loading-shield">Writing execution metrics to Google Sheets ledger...</div>';

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(() => { fetchMatrixData(); })
          .withFailureHandler(handleNetworkError)
          .doPost(JSON.stringify(payload));
      } else {
        fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify(payload),
          headers: { "Content-Type": "text/plain;charset=utf-8" }
        })
        .then(res => res.json())
        .then(() => { fetchMatrixData(); })
        .catch(handleNetworkError);
      }
    }

    function formatDisplayDate(dateStr) {
      if(!dateStr) return "";
      const d = new Date(dateStr);
      if(isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escapeHtml(str) {
      if(!str) return "";
      return str.toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
